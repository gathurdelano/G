<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Kachoo Grandhall</title>
    <style>
        /* ===== putih, hitam, sunyi, tanpa emot/simbol ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background-color: #030303;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: background-image 0.4s ease;
            position: relative;
        }

        /* BACKGROUND: MOBILE = GH2.png , DESKTOP = GH.png */
        @media (max-width: 1024px) and (orientation: portrait), (max-width: 768px) {
            body {
                background-image: url('GH2.png');
            }
        }
        @media (min-width: 1025px), (orientation: landscape) {
            body {
                background-image: url('GH.png');
            }
        }

        /* GRANDHALL LIGHTING — sorot temaram, halus */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 70%, rgba(255,255,255,0.08) 0%, rgba(255,255,240,0.02) 40%, transparent 70%),
                        repeating-linear-gradient(0deg, rgba(255,255,255,0.01) 0px, rgba(0,0,0,0.2) 2px, transparent 3px);
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: overlay;
        }

        /* LAPISAN GELAP tipis biar teks jelas */
        .dim-layer {
            position: relative;
            z-index: 2;
            background-color: rgba(0, 0, 0, 0.2);  /* lebih transparan */
            backdrop-filter: blur(0px);
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;   /* SEMUA KONTEN VERTIKAL TENGAH */
            padding: 2rem 1.5rem;
        }

        .central {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin: auto;              /* bantu pemusatan */
        }

        /* ===== TOMBOL GLASS BEAM (baru) ===== */
        .button-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 1.2rem 2rem;
            margin: 2rem 0 1rem;
            width: 100%;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.08);        /* transparan seperti kaca */
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-weight: 500;
            font-size: 1.3rem;
            padding: 0.8rem 2.2rem;
            border-radius: 60px;
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            letter-spacing: 1px;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(255, 255, 255, 0.1) inset;
            text-transform: uppercase;
            min-width: 160px;
            border-color: rgba(255,255,255,0.4);
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.8);
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
        }

        /* back to lobby sedikit berbeda tapi tetap glass */
        #backToLobby {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(220, 220, 220, 0.4);
            font-size: 1.1rem;
            padding: 0.6rem 1.8rem;
            backdrop-filter: blur(8px);
        }
        #backToLobby:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
        }

        /* panggung konten — sekarang berada di tengah (oleh flex parent) */
        .content-stage {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0.5rem 0 1rem;    /* jarak kecil, tapi parent sudah center */
            transition: all 0.2s;
        }

        .content-panel {
            background: rgba(10, 10, 10, 0.5);
            backdrop-filter: blur(20px) saturate(200%);
            -webkit-backdrop-filter: blur(20px) saturate(200%);
            border-radius: 48px;
            padding: 2rem 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05) inset;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            transition: opacity 0.3s ease, transform 0.25s;
        }

        .page-section {
            display: none;
            width: 100%;
        }

        .page-section.active-section {
            display: block;
        }

        /* slider container */
        .slider-container {
            display: flex;
            gap: 1.2rem;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 0.8rem 0.2rem 1.5rem;
            scrollbar-width: thin;
            scrollbar-color: #ffffff #1e1e1e;
            -webkit-overflow-scrolling: touch;
        }

        .slider-container::-webkit-scrollbar {
            height: 5px;
        }
        .slider-container::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 20px;
        }
        .slider-container::-webkit-scrollbar-thumb {
            background: #ffffff;
            border-radius: 20px;
        }

        .card {
            scroll-snap-align: start;
            flex: 0 0 280px;
            background: #0c0c0c;
            border-radius: 32px;
            border: 1px solid #3a3a3a;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
            transition: transform 0.2s;
        }

        .card video {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: black;
            display: block;
        }

        .card .info {
            padding: 1.2rem 1rem;
            color: #f0f0f0;
            background: #111;
            border-top: 1px solid #2a2a2a;
        }

        .info h4 {
            font-weight: 400;
            letter-spacing: 0.5px;
            color: #ddd;
        }

        /* buy now — tengah, glass juga */
        .buy-now-wrapper {
            display: flex;
            justify-content: center;   /* BUY NOW DI TENGAH */
            margin-top: 1.8rem;
            width: 100%;
        }

        .buy-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255,255,255,0.5);
            color: white;
            padding: 0.7rem 3rem;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 500;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: 0.25s;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            letter-spacing: 1px;
        }

        .buy-btn:hover {
            background: white;
            color: black;
            border-color: white;
        }

        /* single video stage */
        .single-video video {
            width: 100%;
            max-width: 600px;
            border-radius: 32px;
            border: 1px solid #555;
            box-shadow: 0 20px 40px black;
            display: block;
            margin: 0 auto;
        }

        /* category label (untuk display saja, tapi F&B sudah dihapus) */
        .category-label {
            font-size: 1.7rem;
            font-weight: 300;
            margin: 1rem 0 1rem 0.5rem;
            color: #fff;
            border-left: 4px solid white;
            padding-left: 1.2rem;
            letter-spacing: -0.5px;
            opacity: 0.9;
        }

        #bg-music { display: none; }

        /* mobile adjustment: konten lebih besar, tombol lebih kecil */
        @media (max-width: 700px) {
            .nav-btn {
                font-size: 1rem;
                padding: 0.6rem 1.4rem;
                min-width: 130px;
            }
            #backToLobby {
                font-size: 0.95rem;
                padding: 0.5rem 1.2rem;
            }
            .content-panel {
                padding: 1.5rem 1rem;
                border-radius: 36px;
            }
            .card {
                flex: 0 0 240px;  /* card sedikit lebih kecil tapi tetap proporsional */
            }
            .card video {
                height: 150px;
            }
            .buy-btn {
                padding: 0.6rem 2.5rem;
                font-size: 1.1rem;
            }
            .category-label {
                font-size: 1.4rem;
                margin-left: 0.2rem;
            }
        }

        /* lebih kecil lagi untuk hp kecil */
        @media (max-width: 450px) {
            .nav-btn {
                font-size: 0.9rem;
                padding: 0.5rem 1rem;
                min-width: 110px;
            }
            .button-row {
                gap: 0.8rem;
            }
            .card {
                flex: 0 0 200px;
            }
            .content-panel {
                padding: 1.2rem 0.8rem;
            }
        }

        /* tidak ada teks instruksi, sunyi */
        .foot-note {
            text-align: center;
            margin-top: 2rem;
            opacity: 0.15;
            font-size: 0.7rem;
            color: #bbb;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <audio id="bg-music" loop playsinline>
        <source src="GS.mp3" type="audio/mpeg">
    </audio>

    <div class="dim-layer">
        <div class="central">

            <!-- area konten (sekarang di tengah vertikal karena parent justify-content: center) -->
            <div class="content-stage" id="contentStage">
                <!-- stage section -->
                <div id="stageSection" class="page-section">
                    <div class="content-panel" style="text-align: center;">
                        <div class="single-video">
                            <video id="stageVideo" controls playsinline autoplay>
                                <source src="GS.mp4" type="video/mp4">
                            </video>
                        </div>
                        <!-- tanpa teks apapun -->
                    </div>
                </div>

                <!-- display section (hanya ini yang tersisa selain stage) -->
                <div id="displaySection" class="page-section">
                    <div class="content-panel">
                        <!-- konten display (slider video) -->
                        <div class="slider-container">
                            <div class="card">
                                <video controls playsinline autoplay muted loop><source src="Choosic.mp4"></video>
                                <div class="info"><h4>Choosic</h4></div>
                            </div>
                            <div class="card">
                                <video controls playsinline autoplay muted loop><source src="Chozy.mp4"></video>
                                <div class="info"><h4>Chozy</h4></div>
                            </div>
                            <div class="card">
                                <video controls playsinline autoplay muted loop><source src="New.mp4"></video>
                                <div class="info"><h4>New</h4></div>
                            </div>
                        </div>
                        <!-- BUY NOW di tengah (bukan kanan) -->
                        <div class="buy-now-wrapper">
                            <button class="buy-btn" id="buyNowLink">BUY NOW</button>
                        </div>
                    </div>
                </div>

                <!-- FOOD & BEVERAGE SECTION DIHAPUS sesuai permintaan -->
                <!-- tidak ada lagi foodSection -->
            </div>

            <!-- TOMBOL BARIS (hanya Stage, Display, Back to Lobby) -->
            <div class="button-row">
                <button class="nav-btn" id="btnStage">Stage</button>
                <button class="nav-btn" id="btnDisplay">Display</button>
                <button class="nav-btn" id="backToLobby">Back to Lobby</button>
            </div>

            <!-- titik sunyi -->
            <div class="foot-note">•</div>
        </div>
    </div>

    <script>
        (function() {
            const bgMusic = document.getElementById('bg-music');
            const stageSec = document.getElementById('stageSection');
            const displaySec = document.getElementById('displaySection');
            // foodSec dihapus
            const btnStage = document.getElementById('btnStage');
            const btnDisplay = document.getElementById('btnDisplay');
            const backBtn = document.getElementById('backToLobby');
            const stageVideo = document.getElementById('stageVideo');
            const buyNowBtn = document.getElementById('buyNowLink'); 

            // Nonaktifkan semua section
            function deactivateAllSections() {
                stageSec.classList.remove('active-section');
                displaySec.classList.remove('active-section');
            }

            // Memainkan video di display
            function playDisplayVideos() {
                const videos = document.querySelectorAll('#displaySection video');
                videos.forEach(v => v.play().catch(e => console.log('play display', e)));
            }

            // BACK TO LOBBY
            backBtn.addEventListener('click', () => {
                window.location.href = 'Lobby.html';
            });

            // BUY NOW → pindah ke collection
            if (buyNowBtn) {
                buyNowBtn.addEventListener('click', () => {
                    window.location.href = 'https://thekachoo.github.io/KAZINE/COLLECTION.html';
                });
            }

            // STAGE
            btnStage.addEventListener('click', () => {
                deactivateAllSections();
                stageSec.classList.add('active-section');
                bgMusic.pause();
                bgMusic.currentTime = 0;
                stageVideo.play().catch(e => console.log('stage play butuh interaksi'));
            });

            // DISPLAY
            btnDisplay.addEventListener('click', () => {
                deactivateAllSections();
                displaySec.classList.add('active-section');
                bgMusic.pause();
                bgMusic.currentTime = 0;
                setTimeout(() => {
                    playDisplayVideos();
                }, 50);
            });

            // Tidak ada tombol food, tidak ada kode untuk food

            stageVideo.addEventListener('play', () => {
                bgMusic.pause();
                bgMusic.currentTime = 0;
            });

            // Autoplay audio setelah ada gesture sekali saja
            function enableAudioOnce() {
                bgMusic.play().catch(() => {});
                document.body.removeEventListener('click', enableAudioOnce);
                document.body.removeEventListener('touchstart', enableAudioOnce);
            }
            document.body.addEventListener('click', enableAudioOnce, { once: true });
            document.body.addEventListener('touchstart', enableAudioOnce, { once: true });

            // Default: semua section tersembunyi
            window.addEventListener('load', () => {
                deactivateAllSections();
            });

            // buy now lain jika ada (antisipasi)
            document.querySelectorAll('.buy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    window.location.href = 'https://thekachoo.github.io/KAZINE/COLLECTION.html';
                });
            });

        })();
    </script>
</body>
</html>
