<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Kachoo Grandhall</title>
    <style>
        /* ========= putih, hitam, sunyi ========= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background-color: #030303;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: background-image 0.4s ease;
            position: relative;
        }

        /* BACKGROUND BERGANTIAN — MOBILE/DESktop (sesuai permintaan: GH2 utk mobile, GH utk desktop) */
        @media (max-width: 1024px) and (orientation: portrait), (max-width: 768px) {
            body {
                background-image: url('GH2.png');   /* ← mobile */
            }
        }
        @media (min-width: 1025px), (orientation: landscape) {
            body {
                background-image: url('GH.png');    /* ← desktop */
            }
        }

        /* GRANDHALL LIGHTING — sorot bisu, temaram */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 70%, rgba(255,255,255,0.08) 0%, rgba(255,255,240,0.02) 40%, transparent 70%),
                        repeating-linear-gradient(0deg, rgba(255,255,255,0.01) 0px, rgba(0,0,0,0.2) 2px, transparent 3px);
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: overlay;
        }

        /* lapisan gelap tipis supaya teks terbaca */
        .dim-layer {
            position: relative;
            z-index: 2;
            background-color: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(0px);
            min-height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;      /* pusatkan horizontal */
            padding: 2rem 1.5rem 2rem;
        }

        .central {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1200px;
        }

        /* deretan tombol */
        .button-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem 1.5rem;
            margin: 1rem 0 2rem;
            width: 100%;
        }

        .nav-btn {
            background: rgba(15, 15, 15, 0.5);
            border: 1.8px solid rgba(255,255,255,0.75);
            color: white;
            font-weight: 500;
            font-size: 1.3rem;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            backdrop-filter: blur(10px);
            letter-spacing: 1px;
            transition: all 0.25s ease;
            cursor: pointer;
            box-shadow: 0 10px 24px -8px rgba(255,255,255,0.2);
            text-transform: uppercase;
            min-width: 170px;
            border-color: #fff;
        }

        .nav-btn:hover {
            background: #ffffff;
            color: #0a0a0a;
            border-color: #000;
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255,255,255,0.5);
        }

        #backToLobby {
            background: rgba(0, 0, 0, 0.6);
            border-color: #aaa;
            font-size: 1.1rem;
            padding: 0.6rem 1.8rem;
            backdrop-filter: blur(4px);
        }

        /* panggung konten — di ATAS tombol */
        .content-stage {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 2.5rem;
            min-height: 280px;
            transition: all 0.2s;
        }

        .content-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 2rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 30px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05) inset;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            transition: opacity 0.3s ease, transform 0.25s;
        }

        .page-section {
            display: none;
            width: 100%;
        }

        .page-section.active-section {
            display: block;
        }

        /* slider khas grandhall */
        .slider-container {
            display: flex;
            gap: 1.2rem;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 0.8rem 0.2rem 1.5rem;
            scrollbar-width: thin;
            scrollbar-color: #ffffff #1e1e1e;
            -webkit-overflow-scrolling: touch;
        }

        .slider-container::-webkit-scrollbar {
            height: 5px;
        }
        .slider-container::-webkit-scrollbar-track {
            background: #1a1a1a;
            border-radius: 20px;
        }
        .slider-container::-webkit-scrollbar-thumb {
            background: #ffffff;
            border-radius: 20px;
        }

        .card {
            scroll-snap-align: start;
            flex: 0 0 280px;
            background: #0c0c0c;
            border-radius: 32px;
            border: 1px solid #3a3a3a;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
            transition: transform 0.2s;
        }

        .card video {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: black;
            display: block;
        }

        .card .info {
            padding: 1.2rem 1rem;
            color: #f0f0f0;
            background: #111;
            border-top: 1px solid #2a2a2a;
        }

        .info h4 {
            font-weight: 400;
            letter-spacing: 0.5px;
            color: #ddd;
        }

        .buy-btn {
            background: transparent;
            border: 1.8px solid white;
            color: white;
            padding: 0.6rem 2.4rem;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 500;
            width: fit-content;
            transition: 0.2s;
            cursor: pointer;
            margin-top: 0.8rem;
            margin-left: auto;
            display: inline-block;
        }

        .buy-btn:hover {
            background: white;
            color: black;
        }

        .category-label {
            font-size: 1.7rem;
            font-weight: 300;
            margin: 1.8rem 0 1rem 0.5rem;
            color: #fff;
            border-left: 4px solid white;
            padding-left: 1.2rem;
            letter-spacing: -0.5px;
            opacity: 0.9;
        }

        .single-video video {
            width: 100%;
            max-width: 600px;
            border-radius: 32px;
            border: 1px solid #555;
            box-shadow: 0 20px 40px black;
        }

        #bg-music {
            display: none;
        }

        /* tanpa petunjuk teks, sunyi */
        .info p, .category-label, .card, button {
            user-select: none;
        }

        .foot-note {
            text-align: center;
            margin-top: 2rem;
            opacity: 0.2;
            font-size: 0.7rem;
            color: #bbb;
            pointer-events: none;
        }

        /* tidak ada simbol/emoticon — semuanya bersih */
    </style>
</head>
<body>
    <audio id="bg-music" loop playsinline>
        <source src="GS.mp3" type="audio/mpeg">
    </audio>

    <div class="dim-layer">
        <div class="central">

            <!-- area konten (di atas tombol) -->
            <div class="content-stage" id="contentStage">
                <!-- stage section -->
                <div id="stageSection" class="page-section">
                    <div class="content-panel" style="text-align: center;">
                        <div class="single-video">
                            <video id="stageVideo" controls playsinline autoplay>
                                <source src="GS.mp4" type="video/mp4">
                            </video>
                        </div>
                        <!-- tidak ada teks apapun -->
                    </div>
                </div>

                <!-- display section -->
                <div id="displaySection" class="page-section">
                    <div class="content-panel">
                        <div class="slider-container">
                            <div class="card">
                                <video controls playsinline autoplay muted loop><source src="Choosic.mp4"></video>
                                <div class="info"><h4>Choosic</h4></div>
                            </div>
                            <div class="card">
                                <video controls playsinline autoplay muted loop><source src="Chozy.mp4"></video>
                                <div class="info"><h4>Chozy</h4></div>
                            </div>
                            <div class="card">
                                <video controls playsinline autoplay muted loop><source src="New.mp4"></video>
                                <div class="info"><h4>New</h4></div>
                            </div>
                        </div>
                        <!-- tombol buy now koleksi -->
                        <div style="display: flex; justify-content: flex-end; margin-top: 0.2rem;">
                            <button class="buy-btn" id="buyNowLink">BUY NOW</button>
                        </div>
                    </div>
                </div>

                <!-- food & beverage section -->
                <div id="foodSection" class="page-section">
                    <div class="content-panel">
                        <!-- FOOD -->
                        <div class="category-label">FOOD</div>
                        <div class="slider-container">
                            <div class="card"><div class="info"><h4>Burger hitam</h4></div></div>
                            <div class="card"><div class="info"><h4>Pasta putih</h4></div></div>
                            <div class="card"><div class="info"><h4>Risotto</h4></div></div>
                            <div class="card"><div class="info"><h4>Steak</h4></div></div>
                        </div>
                        <!-- DRINK -->
                        <div class="category-label">DRINK</div>
                        <div class="slider-container">
                            <div class="card"><div class="info"><h4>Espresso</h4></div></div>
                            <div class="card"><div class="info"><h4>Matcha latte</h4></div></div>
                            <div class="card"><div class="info"><h4>Lemon soda</h4></div></div>
                            <div class="card"><div class="info"><h4>Dark roast</h4></div></div>
                        </div>
                        <!-- DESSERT -->
                        <div class="category-label">DESSERT</div>
                        <div class="slider-container">
                            <div class="card"><div class="info"><h4>Panna cotta</h4></div></div>
                            <div class="card"><div class="info"><h4>Tiramisu</h4></div></div>
                            <div class="card"><div class="info"><h4>Dark choco</h4></div></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TOMBOL BARIS (di bawah konten) -->
            <div class="button-row">
                <button class="nav-btn" id="btnStage">Stage</button>
                <button class="nav-btn" id="btnDisplay">Display</button>
                <button class="nav-btn" id="btnFood">Food & Beverage</button>
                <button class="nav-btn" id="backToLobby">Back to Lobby</button>
            </div>

            <!-- titik senyap -->
            <div class="foot-note">•</div>
        </div>
    </div>

    <script>
        (function() {
            const bgMusic = document.getElementById('bg-music');
            const stageSec = document.getElementById('stageSection');
            const displaySec = document.getElementById('displaySection');
            const foodSec = document.getElementById('foodSection');
            const btnStage = document.getElementById('btnStage');
            const btnDisplay = document.getElementById('btnDisplay');
            const btnFood = document.getElementById('btnFood');
            const backBtn = document.getElementById('backToLobby');
            const stageVideo = document.getElementById('stageVideo');
            const buyNowBtn = document.getElementById('buyNowLink'); 

            function deactivateAllSections() {
                stageSec.classList.remove('active-section');
                displaySec.classList.remove('active-section');
                foodSec.classList.remove('active-section');
            }

            function playDisplayVideos() {
                const videos = document.querySelectorAll('#displaySection video');
                videos.forEach(v => v.play().catch(e => console.log('play display', e)));
            }

            // BACK TO LOBBY
            backBtn.addEventListener('click', () => {
                window.location.href = 'Lobby.html';
            });

            // BUY NOW → pindah ke collection
            if (buyNowBtn) {
                buyNowBtn.addEventListener('click', () => {
                    window.location.href = 'https://thekachoo.github.io/KAZINE/COLLECTION.html';
                });
            }

            // STAGE
            btnStage.addEventListener('click', () => {
                deactivateAllSections();
                stageSec.classList.add('active-section');
                bgMusic.pause();
                bgMusic.currentTime = 0;
                stageVideo.play().catch(e => console.log('stage play butuh interaksi'));
            });

            // DISPLAY
            btnDisplay.addEventListener('click', () => {
                deactivateAllSections();
                displaySec.classList.add('active-section');
                bgMusic.pause();
                bgMusic.currentTime = 0;
                setTimeout(() => {
                    playDisplayVideos();
                }, 50);
            });

            // FOOD & BEVERAGE
            btnFood.addEventListener('click', () => {
                deactivateAllSections();
                foodSec.classList.add('active-section');
                // mainkan musik latar
                bgMusic.play().catch(e => console.log('musik play setelah food'));
            });

            stageVideo.addEventListener('play', () => {
                bgMusic.pause();
                bgMusic.currentTime = 0;
            });

            // Autoplay audio setelah ada gesture sekali saja (opsional)
            function enableAudioOnce() {
                bgMusic.play().catch(() => {});
                document.body.removeEventListener('click', enableAudioOnce);
                document.body.removeEventListener('touchstart', enableAudioOnce);
            }
            document.body.addEventListener('click', enableAudioOnce, { once: true });
            document.body.addEventListener('touchstart', enableAudioOnce, { once: true });

            // Default: semua section tersembunyi (tidak ada yg aktif)
            window.addEventListener('load', () => {
                deactivateAllSections();
            });

            // buy now lain (misal jika ada lebih dari satu)
            document.querySelectorAll('.buy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    window.location.href = 'https://thekachoo.github.io/KAZINE/COLLECTION.html';
                });
            });

        })();
    </script>
</body>
                                </html>
