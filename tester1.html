<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KACHOO EXHIBITION — LIGHT & AUDIO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 0 16px;
            overflow-x: hidden;
        }

        /* === LIGHTING PUTIH HALUS (sesuai permintaan: bukan kuning, putih) === */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 35%, rgba(255,255,255,0.25) 0%, rgba(0,0,0,0.75) 80%);
            pointer-events: none;
            z-index: 1;
        }

        /* spotlight utama putih halus */
        .main-spot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse 55% 40% at 50% 38%, rgba(255,255,245,0.35) 0%, rgba(0,0,0,0.6) 80%);
            pointer-events: none;
            z-index: 2;
        }

        /* efek rim light belakang produk (putih lembut) */
        .back-rim {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: 2;
            filter: blur(35px);
        }

        /* floor glow bawah (putih bersih) */
        .floor-name-glow {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 140px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.4) 0%, transparent 85%);
            pointer-events: none;
            z-index: 2;
            filter: blur(12px);
        }

        /* container utama */
        .container {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            padding: 20px 0 30px;
        }

        /* INTRO OVERLAY */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.5s ease;
            backdrop-filter: blur(2px);
        }

        .intro-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .intro-card {
            width: 100%;
            max-width: 340px;
            background: rgba(10,10,10,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 32px;
            padding: 36px 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 35px rgba(255,255,255,0.3);
        }

        .intro-card p {
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 3px;
            margin-bottom: 32px;
            line-height: 1.4;
            text-shadow: 0 0 12px rgba(255,255,255,0.8);
        }

        .intro-btn {
            background: transparent;
            border: 1.5px solid #ffffff;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 3px;
            padding: 14px 32px;
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 12px rgba(255,255,255,0.5);
        }

        .intro-btn:active {
            background: #fff;
            color: #000;
            box-shadow: 0 0 30px #ffffff;
        }

        /* HEADER: tulisan KACHOO EXHIBITION DIPERBESAR dan berada DI ATAS PRODUK */
        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            position: relative;
            z-index: 25;
        }

        .header h1 {
            font-size: clamp(2.4rem, 10vw, 3.8rem);
            font-weight: 700;
            letter-spacing: 6px;
            text-shadow: 0 0 25px rgba(255,255,255,0.9), 0 0 35px rgba(255,255,255,0.6);
            background: linear-gradient(135deg, #ffffff, #f0f0f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            word-break: keep-all;
        }

        /* area utama: produk melayang, besar, CENTER */
        .hero-product {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin: 10px 0 20px;
            position: relative;
        }

        .product-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
            margin: 0 auto;
        }

        .product-frame {
            width: 320px;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 25px 35px rgba(0,0,0,0.6)) drop-shadow(0 0 35px rgba(255,255,255,0.5));
            animation: floatPremium 3.2s infinite alternate ease-in-out;
            position: relative;
            background: transparent;
        }

        /* produk diperbesar */
        .product-frame img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(1.08) contrast(1.02) drop-shadow(0 0 18px rgba(255,255,255,0.4));
            transition: filter 0.3s;
            display: block;
        }

        /* efek melayang */
        @keyframes floatPremium {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-14px) rotate(0.5deg); }
        }

        /* lighting belakang produk ditambah (PUTIH) */
        .back-glow-product {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 380px;
            height: 380px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0.25) 40%, transparent 80%);
            filter: blur(38px);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

        /* extra back lighting putih tambahan */
        .extra-back-lighting {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 450px;
            height: 450px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 70%);
            filter: blur(55px);
            z-index: -2;
            pointer-events: none;
        }

        /* BUY NOW button (menggantikan tag name sebelumnya) */
        .buynow-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        .buynow-btn {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border: 1.5px solid rgba(255,255,255,0.9);
            padding: 10px 32px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
            font-family: inherit;
        }

        .buynow-btn:active {
            background: #ffffff;
            color: #000000;
            transform: scale(0.97);
            box-shadow: 0 0 35px rgba(255,255,255,0.7);
        }

        /* navigation: tetap prev/next, dan di tengah ada NAMA PRODUK (bukan 1/8) */
        .navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            margin: 28px 0 12px;
            width: 100%;
        }

        .nav-btn {
            background: rgba(20,20,20,0.7);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.7);
            color: #fff;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 12px rgba(255,255,255,0.3);
        }

        .nav-btn:active {
            background: #fff;
            color: #1e1e1e;
            border-color: #fff;
            box-shadow: 0 0 28px #ffffff;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            border-color: rgba(255,255,255,0.3);
            pointer-events: none;
        }

        .nav-btn svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        /* product name display di tengah (menggantikan counter) */
        .product-name-display {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            background: rgba(0,0,0,0.55);
            padding: 8px 24px;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(8px);
            text-align: center;
            min-width: 160px;
            color: #fff;
            text-transform: uppercase;
            font-weight: 600;
        }

        .footer {
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #cccccc;
            padding: 18px 0 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
            margin-top: 12px;
            width: 100%;
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .product-frame {
                width: 260px;
                height: 260px;
            }
            .back-glow-product {
                width: 320px;
                height: 320px;
            }
            .header h1 {
                font-size: clamp(2rem, 8vw, 3rem);
                letter-spacing: 3px;
            }
            .buynow-btn {
                font-size: 1rem;
                padding: 8px 26px;
            }
            .product-name-display {
                font-size: 0.9rem;
                padding: 6px 16px;
                min-width: 130px;
            }
            .nav-btn {
                width: 48px;
                height: 48px;
            }
        }

        @media (max-width: 380px) {
            .product-frame {
                width: 220px;
                height: 220px;
            }
            .back-glow-product {
                width: 280px;
                height: 280px;
            }
        }

        @media (orientation: landscape) and (max-height: 550px) {
            .container {
                padding: 12px 0;
            }
            .product-frame {
                width: 190px;
                height: 190px;
            }
            .header h1 {
                font-size: 2rem;
            }
            .navigation {
                margin: 12px 0;
            }
            .buynow-container {
                margin-top: 12px;
            }
        }

        .audio-hint {
            position: fixed;
            bottom: 12px;
            right: 12px;
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.4);
            padding: 4px 10px;
            border-radius: 20px;
            z-index: 50;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <!-- LIGHTING PUTIH HALUS (semua layer sudah diubah ke putih) -->
    <div class="ambient-light"></div>
    <div class="main-spot"></div>
    <div class="back-rim"></div>
    <div class="floor-name-glow"></div>

    <!-- INTRO OVERLAY -->
    <div class="intro-overlay" id="introOverlay">
        <div class="intro-card">
            <p>KACHOO<br>EXHIBITION</p>
            <button class="intro-btn" id="introBtn">ENTER</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container">
        <header class="header">
            <h1>KACHOO EXHIBITION</h1>
        </header>

        <div class="hero-product">
            <div class="product-wrapper">
                <!-- lighting belakang putih extra -->
                <div class="extra-back-lighting"></div>
                <div class="back-glow-product"></div>
                <div class="product-frame" id="productFrame">
                    <img id="productImage" src="" alt="exhibit product">
                </div>
            </div>
            <!-- BUY NOW button (menggantikan tag name sebelumnya) -->
            <div class="buynow-container">
                <button class="buynow-btn" id="buyNowBtn">BUY NOW</button>
            </div>
        </div>

        <!-- NAVIGATION: prev + nama produk (bukan counter) + next -->
        <div class="navigation">
            <button class="nav-btn" id="prevBtn" disabled>
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <div class="product-name-display" id="productNameDisplay">Choosic1</div>
            <button class="nav-btn" id="nextBtn">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
        </div>

        <footer class="footer">
            For Roleplay Purpose Only · Kachoo 2026
        </footer>
    </div>
    <div class="audio-hint">🎧 AUDIO READY</div>

    <script>
        (function() {
            // --- INTRO OVERLAY ---
            const intro = document.getElementById('introOverlay');
            const introBtn = document.getElementById('introBtn');
            
            // --- AUTOMATIC AUDIO dengan exhibition.mp3 ---
            let audioPlayer = null;
            let audioStarted = false;

            function initAndPlayAudio() {
                if (audioStarted) return;
                try {
                    audioPlayer = new Audio('exhibition.mp3');
                    audioPlayer.loop = true;
                    audioPlayer.volume = 0.75;
                    const playPromise = audioPlayer.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            console.log('Automatic audio exhibition.mp3 started');
                            audioStarted = true;
                        }).catch(err => {
                            console.warn('Audio autoplay blocked, but ENTER click will retry', err);
                        });
                    }
                } catch(e) {
                    console.log('Audio file error, pastikan exhibition.mp3 tersedia', e);
                }
            }

            // Saat ENTER ditekan, hilangkan overlay dan pastikan audio berjalan
            introBtn.addEventListener('click', function() {
                intro.classList.add('hidden');
                if (!audioStarted) {
                    initAndPlayAudio();
                }
            });

            // --- DATA PRODUK (nama file gambar) ---
            const products = [
                'Choosic1.png',
                'Choosic2.png',
                'Choosic3.png',
                'Choosic4.png',
                'Chozy1.png',
                'Chozy2.png',
                'Produk1.png',
                'Produk2.png'
            ];

            // Nama produk untuk ditampilkan di tengah (prev/next), bukan counter 1/8
            const productDisplayNames = [
                'Choosic 1',
                'Choosic 2',
                'Choosic 3',
                'Choosic 4',
                'Chozy 1',
                'Chozy 2',
                'Produk 1',
                'Produk 2'
            ];

            const img = document.getElementById('productImage');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const productNameDisplay = document.getElementById('productNameDisplay');
            const buyNowBtn = document.getElementById('buyNowBtn');

            let currentIndex = 0;

            function updateDisplay() {
                img.src = products[currentIndex];
                // menampilkan nama produk (bukan 1/8)
                productNameDisplay.textContent = productDisplayNames[currentIndex];
                
                prevBtn.disabled = currentIndex === 0;
                nextBtn.disabled = currentIndex === products.length - 1;

                // efek halus saat ganti
                img.style.opacity = '0.95';
                setTimeout(() => { if(img) img.style.opacity = '1'; }, 50);
            }

            prevBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (currentIndex > 0) {
                    currentIndex--;
                    updateDisplay();
                }
            });

            nextBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (currentIndex < products.length - 1) {
                    currentIndex++;
                    updateDisplay();
                }
            });

            // BUY NOW button: semua klik pindah ke link yang ditentukan
            buyNowBtn.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = 'https://thekachoo.github.io/KAZINE/COLLECTION.html';
            });

            // Error handling gambar (tetap tanpa placeholder)
            img.onerror = function() {
                console.warn('Image not loaded:', img.src);
            };

            updateDisplay();

            // Efek lighting dinamis halus (putih) saat ganti produk
            const backGlow = document.querySelector('.back-glow-product');
            if(backGlow) {
                const changeLight = () => {
                    backGlow.style.transition = 'opacity 0.3s';
                    backGlow.style.opacity = '0.7';
                    setTimeout(() => { if(backGlow) backGlow.style.opacity = '1'; }, 150);
                };
                const observer = new MutationObserver(() => changeLight());
                observer.observe(img, { attributes: true, attributeFilter: ['src'] });
            }

            // Tambahan: pastikan tidak ada counter atau tag name lama yang tersisa
            // Semua sudah sesuai: lighting putih, buy now, nama produk di tengah navigasi.
        })();
    </script>
</body>
    </html>
