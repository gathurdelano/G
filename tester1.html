<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Kachoo Building</title>
  <!-- Inter font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #000000;
      color: #FFFFFF;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    /* BUILDING SCENE - full picture, no motion */
    #scene-building {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Dark overlay - minimal, hanya agar teks terbaca */
    #scene-building::after {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.2);
      pointer-events: none;
      z-index: 1;
    }

    /* Background images - full picture */
    #scene-building {
      background-image: url('building1.png');
    }

    @media (max-width: 1024px) {
      #scene-building {
        background-image: url('building2.png');
      }
    }

    /* Fallback SVG */
    @media (min-width: 1025px) {
      #scene-building {
        background-image: url('building1.png'), url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22><rect width=%22400%22 height=%22300%22 fill=%22%23222c3a%22/><rect x=%2250%22 y=%2280%22 width=%22300%22 height=%22160%22 fill=%22%233a4a5e%22 rx=%228%22/><rect x=%22120%22 y=%22120%22 width=%2240%22 height=%2240%22 fill=%22%235e6b7e%22 rx=%224%22/><rect x=%22240%22 y=%22120%22 width=%2240%22 height=%2240%22 fill=%22%235e6b7e%22 rx=%224%22/><rect x=%22100%22 y=%22200%22 width=%22200%22 height=%2220%22 fill=%22%231a2532%22/><circle cx=%22200%22 cy=%22100%22 r=%2212%22 fill=%22%23aab7c9%22 /></svg>');
      }
    }

    @media (max-width: 1024px) {
      #scene-building {
        background-image: url('building2.png'), url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 600%22><rect width=%22400%22 height=%22600%22 fill=%22%23222c3a%22/><rect x=%2250%22 y=%22150%22 width=%22300%22 height=%22300%22 fill=%22%233a4a5e%22 rx=%228%22/><rect x=%22120%22 y=%22200%22 width=%2240%22 height=%2240%22 fill=%22%235e6b7e%22 rx=%224%22/><rect x=%22240%22 y=%22200%22 width=%2240%22 height=%2240%22 fill=%22%235e6b7e%22 rx=%224%22/><rect x=%22100%22 y=%22400%22 width=%22200%22 height=%2220%22 fill=%22%231a2532%22/><circle cx=%22200%22 cy=%22250%22 r=%2212%22 fill=%22%23aab7c9%22 /></svg>');
      }
    }

    /* CONTENT - pure centered text */
    .building-content {
      position: relative;
      z-index: 20;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      cursor: pointer;
    }

    /* Welcome message - center, no motion */
    .welcome-message {
      text-align: center;
    }

    .welcome-message h1 {
      font-size: clamp(3rem, 15vw, 6rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      color: #FFFFFF;
      text-shadow: 0 4px 30px rgba(0, 0, 0, 0.7);
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .welcome-message p {
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      font-weight: 400;
      color: #EEEEEE;
      text-shadow: 0 2px 15px rgba(0, 0, 0, 0.7);
      letter-spacing: 0.5px;
    }

    /* Tombol masuk - simple */
    .enter-button {
      background: transparent;
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.8);
      padding: 1rem 3rem;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
      margin-top: 3rem;
      backdrop-filter: blur(5px);
    }

    .enter-button:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: white;
      transform: scale(1.05);
    }

    /* Page transition - simple */
    .page-transition {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .page-transition.active {
      opacity: 1;
      pointer-events: all;
    }

    .transition-content h2 {
      font-size: 2rem;
      font-weight: 300;
      letter-spacing: 5px;
      color: white;
    }

    /* Ripple effect - simple */
    .ripple-effect {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.5) 0%, transparent 70%);
      transform: translate(-50%, -50%) scale(0);
      animation: ripple 1s ease-out;
      pointer-events: none;
      z-index: 100;
      width: 100px;
      height: 100px;
    }

    @keyframes ripple {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(15); opacity: 0; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .enter-button {
        padding: 0.8rem 2rem;
        font-size: 1rem;
        margin-top: 2rem;
      }
    }
  </style>
</head>
<body>
  <!-- BUILDING SCENE - Full picture, no motion, no blank hole -->
  <div id="scene-building">
    <!-- Content - pure centered text -->
    <div class="building-content" id="mainContent">
      <div class="welcome-message">
        <h1>KACHOO BUILDING</h1>
        <p>Explore the building</p>
      </div>
      
      <!-- Tombol masuk -->
      <button class="enter-button" id="enterButton">
        ENTER
      </button>
    </div>
  </div>

  <!-- Page transition overlay -->
  <div class="page-transition" id="pageTransition">
    <div class="transition-content">
      <h2>WELCOME</h2>
    </div>
  </div>

  <script>
    (function() {
      'use strict';
      
      const buildingScene = document.getElementById('scene-building');
      const mainContent = document.getElementById('mainContent');
      const enterButton = document.getElementById('enterButton');
      const transitionOverlay = document.getElementById('pageTransition');
      
      // Efek ripple sederhana
      function createRipple(x, y) {
        const ripple = document.createElement('div');
        ripple.className = 'ripple-effect';
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        document.body.appendChild(ripple);
        
        setTimeout(() => {
          ripple.remove();
        }, 1000);
      }
      
      // Fungsi pindah ke Lobby.html
      function goToLobby(event) {
        // Buat ripple
        createRipple(event.clientX, event.clientY);
        
        // Tampilkan transition overlay
        setTimeout(() => {
          transitionOverlay.classList.add('active');
        }, 100);
        
        // Redirect ke Lobby.html
        setTimeout(() => {
          window.location.href = 'Lobby.html';
        }, 800);
      }
      
      // Event listener untuk seluruh konten
      mainContent.addEventListener('click', (e) => {
        e.stopPropagation();
        goToLobby(e);
      });
      
      // Tombol enter
      enterButton.addEventListener('click', (e) => {
        e.stopPropagation();
        goToLobby(e);
      });
      
      // Background juga bisa diklik
      buildingScene.addEventListener('click', (e) => {
        // Jika yang diklik adalah buildingScene langsung
        if (e.target === buildingScene) {
          const fakeEvent = { 
            clientX: window.innerWidth / 2, 
            clientY: window.innerHeight / 2 
          };
          goToLobby(fakeEvent);
        }
      });
      
      // Tampilkan building
      buildingScene.style.opacity = '1';
      
    })();
  </script>
</body>
  </html>
