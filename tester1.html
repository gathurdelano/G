<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kachoo Building (tanpa judul)</title>
  <style>
    /* RESET & DASAR */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;         /* mencegah scroll */
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    /* LAYER BACKGROUND UTAMA (full screen) */
    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: background-image 0.9s ease, filter 0.6s ease;
      /* efek gelap lembut via overlay terpisah agar tidak mengganggu transisi */
    }

    /* overlay gelap seragam (tipis) */
    .scene::after {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.2);  /* 20% gelap — 'rada gelap tp jgn terlalu' */
      pointer-events: none;  /* tombol tetap bisa diklik */
      z-index: 1;
      transition: background-color 0.5s;
    }

    /* semua konten di atas overlay */
    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ========== TAMPILAN AWAL (building) ========== */
    #scene-1 {
      background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22 width=%22100%%22 height=%22100%%22><rect width=%22400%22 height=%22300%22 fill=%22%23222c3a%22/><rect x=%2250%22 y=%2280%22 width=%22300%22 height=%22160%22 fill=%22%233a4a5e%22 rx=%228%22/><rect x=%22120%22 y=%22120%22 width=%2240%22 height=%2240%22 fill=%22%235e6b7e%22 rx=%224%22/><rect x=%22240%22 y=%22120%22 width=%2240%22 height=%2240%22 fill=%22%235e6b7e%22 rx=%224%22/><rect x=%22100%22 y=%22200%22 width=%22200%22 height=%2220%22 fill=%22%231a2532%22/><circle cx=%22200%22 cy=%22100%22 r=%2212%22 fill=%22%23aab7c9%22 /></svg>'); /* building.png gaya */
      /* catatan: karena file asli building.png tidak tersedia, kita gunakan SVG ilustratif.
         Jika di lingkungan nyata, ganti url dengan 'building.png' */
    }

    /* ========== TAMPILAN GROUND (lobby) ========== */
    #scene-2 {
      background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22><rect width=%22400%22 height=%22300%22 fill=%22%23354b42%22/><rect x=%2230%22 y=%2250%22 width=%22340%22 height=%22200%22 fill=%22%236a7c70%22 rx=%2216%22/><rect x=%2280%22 y=%22100%22 width=%2260%22 height=%2260%22 fill=%22%23aac3b3%22 rx=%228%22/><rect x=%22260%22 y=%22100%22 width=%2260%22 height=%2260%22 fill=%22%23aac3b3%22 rx=%228%22/><circle cx=%22200%22 cy=%22150%22 r=%2230%22 fill=%22%23cadfd1%22 opacity=%220.6%22 /></svg>'); /* lobby.png ilustrasi */
    }

    /* TOMBOL UTAMA (container) */
    .button-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      background-color: rgba(10, 15, 20, 0.55);  /* gelap transparan, biar tombol kebaca */
      backdrop-filter: blur(6px);
      border-radius: 64px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.5);
      transform: scale(1);
      transition: opacity 0.6s ease, transform 0.4s ease;
      max-width: 90vw;
      margin: 1rem;
    }

    /* tiap tombol */
    .floor-btn {
      padding: 1rem 2.2rem;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: white;
      background: rgba(20, 30, 40, 0.8);
      backdrop-filter: blur(8px);
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 60px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
      transition: all 0.25s;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      min-width: 160px;
    }

    .floor-btn:hover {
      background: rgba(50, 70, 100, 0.9);
      border-color: rgba(255, 240, 160, 0.7);
      transform: scale(1.05) translateY(-3px);
      box-shadow: 0 18px 30px -5px black;
    }

    /* pesan awal: klik di mana saja (petunjuk halus) */
    .enter-hint {
      color: rgba(255, 255, 255, 0.8);
      text-shadow: 0 2px 10px black;
      font-size: 1.4rem;
      background: rgba(0,0,0,0.3);
      padding: 0.6rem 2rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,215,0,0.3);
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 2rem;
      animation: softPulse 2s infinite;
    }

    .enter-hint:hover {
      background: rgba(30, 30, 30, 0.7);
      border-color: gold;
    }

    @keyframes softPulse {
      0% { opacity: 0.9; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.02); background: rgba(20,20,30,0.5); }
      100% { opacity: 0.9; transform: scale(1); }
    }

    /* transisi fade antar scene */
    .fade-transition {
      transition: background-image 1.2s cubic-bezier(0.4, 0, 0.2, 1), filter 0.8s;
    }

    /* elemen yg sengaja disembunyikan */
    .hidden {
      display: none !important;
    }

    /* utility */
    .full-center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    /* tambahan gradasi pudar saat transisi antar konten (opsional) */
    .content-fade-enter {
      opacity: 0;
    }
    .content-fade-enter-active {
      opacity: 1;
      transition: opacity 0.7s;
    }

    /* untuk memudahkan klik di area luas */
    .click-catcher {
      position: absolute;
      inset: 0;
      z-index: 5;
      cursor: pointer;
    }

    /* konten scene2 (tombol) di atas layer klik */
    .scene .content {
      pointer-events: none; /* biar yang bisa diklik hanya tombol & hint */
    }
    .scene .content * {
      pointer-events: auto;
    }

    /* background gelap overlay lebih terasa */
    .scene-2::after {
      background-color: rgba(0, 0, 0, 0.25) !important; /* sedikit lebih gelap dari yg pertama, tapi tetap tidak terlalu gelap */
    }

  </style>
</head>
<body>

<!-- DUA LAYER ADEGAN: pertama building, kedua lobby (ground) dengan tombol -->
<div id="scene-building" class="scene" style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22 width=%22100%%22 height=%22100%%22><rect width=%22400%22 height=%22300%22 fill=%22%23222c3a%22/><rect x=%2250%22 y=%2280%22 width=%22300%22 height=%22160%22 fill=%22%233a4a5e%22 rx=%228%22/><rect x=%22120%22 y=%22120%22 width=%2240%22 height=%2240%22 fill=%22%235e6b7e%22 rx=%224%22/><rect x=%22240%22 y=%22120%22 width=%2240%22 height=%2240%22 fill=%22%235e6b7e%22 rx=%224%22/><rect x=%22100%22 y=%22200%22 width=%22200%22 height=%2220%22 fill=%22%231a2532%22/><circle cx=%22200%22 cy=%22100%22 r=%2212%22 fill=%22%23aab7c9%22 /></svg>');">
  <!-- overlay gelap sudah dari css pseudo -->

  <!-- konten awal: hint enter -->
  <div class="content" id="initial-content">
    <div class="enter-hint" id="click-to-enter">👇 klik di mana saja untuk masuk lobby</div>
    <!-- kita bisa tambahkan logo atau nothing, sesuai permintaan tanpa header -->
  </div>

  <!-- area klik besar (menyeluruh) untuk masuk ke Ground -->
  <div class="click-catcher" id="enter-lobby-trigger"></div>
</div>

<!-- Scene Lobby (Ground) – awalnya tersembunyi, akan muncul setelah klik dengan transisi -->
<div id="scene-lobby" class="scene hidden" style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22><rect width=%22400%22 height=%22300%22 fill=%22%23354b42%22/><rect x=%2230%22 y=%2250%22 width=%22340%22 height=%22200%22 fill=%22%236a7c70%22 rx=%2216%22/><rect x=%2280%22 y=%22100%22 width=%2260%22 height=%2260%22 fill=%22%23aac3b3%22 rx=%228%22/><rect x=%22260%22 y=%22100%22 width=%2260%22 height=%2260%22 fill=%22%23aac3b3%22 rx=%228%22/><circle cx=%22200%22 cy=%22150%22 r=%2230%22 fill=%22%23cadfd1%22 opacity=%220.6%22 /></svg>');">
  <div class="content full-center">
    <!-- container tombol sesuai daftar -->
    <div class="button-container">
      <!-- Lift → lift.html -->
      <a href="lift.html" class="floor-btn" target="_blank">Lift</a>
      <!-- Information desk → info.html -->
      <a href="info.html" class="floor-btn" target="_blank">Information desk</a>
      <!-- Grand Hall → GH.html -->
      <a href="GH.html" class="floor-btn" target="_blank">Grand Hall</a>
      <!-- Exhibition Center → Exhibition.html -->
      <a href="Exhibition.html" class="floor-btn" target="_blank">Exhibition Center</a>
      <!-- Chobank → Chobank.html -->
      <a href="Chobank.html" class="floor-btn" target="_blank">Chobank</a>
      <!-- Food Court → FC.html -->
      <a href="FC.html" class="floor-btn" target="_blank">Food Court</a>
    </div>
    <!-- keterangan kecil (bukan header) -->
    <div style="margin-top: 2rem; color: rgba(255,255,240,0.7); font-size: 1rem; background: rgba(0,0,0,0.3); padding: 0.5rem 1.5rem; border-radius: 40px; backdrop-filter: blur(2px);">Kachoo Building – Lantai Ground</div>
  </div>
</div>

<script>
  (function() {
    'use strict';

    const sceneBuilding = document.getElementById('scene-building');
    const sceneLobby = document.getElementById('scene-lobby');
    const enterTrigger = document.getElementById('enter-lobby-trigger');
    const clickHint = document.getElementById('click-to-enter');

    // Fungsi transisi: sembunyikan building, munculkan lobby dengan efek fade.
    function switchToLobby() {
      // pastikan tidak multiple trigger
      if (sceneBuilding.classList.contains('hidden')) return;

      // langkah 1: mulai transisi dengan memberikan efek fade pada building (turunkan opacity?)
      // kita bisa memanfaatkan transisi pada pseudo, tapi lebih mudah dengan mengubah opacity konten
      // namun background langsung kita ganti dengan teknik dua layer: sembunyikan building, tampilkan lobby.
      // namun agar lebih dramatis, kita bisa menerapkan sedikit penundaan dan kelas fade.
      
      // Terapkan efek 'keluar' pada building: sedikit pudar
      sceneBuilding.style.transition = 'opacity 0.8s ease';
      sceneBuilding.style.opacity = '0';
      
      // sementara itu siapkan lobby dengan opacity 0 lalu munculkan
      sceneLobby.classList.remove('hidden');
      sceneLobby.style.opacity = '0';
      sceneLobby.style.transition = 'opacity 1s ease';
      
      // paksa reflow
      void sceneLobby.offsetWidth;

      // setelah building setengah menghilang, kita sembunyikan dan atur opacity lobby jadi 1
      setTimeout(() => {
        sceneBuilding.classList.add('hidden');
        sceneBuilding.style.opacity = ''; // reset
        // pastikan lobby muncul dengan fade in
        sceneLobby.style.opacity = '1';
      }, 700); // waktu mendekati setengah transisi

      // bersihkan transisi di lobby setelah selesai
      setTimeout(() => {
        sceneLobby.style.transition = '';
      }, 1800);
      
      // nonaktifkan trigger agar tidak klik dua kali
      if (enterTrigger) enterTrigger.style.pointerEvents = 'none';
    }

    // Event listener untuk masuk ke lobby
    if (enterTrigger) {
      enterTrigger.addEventListener('click', switchToLobby);
    }
    if (clickHint) {
      clickHint.addEventListener('click', (e) => {
        e.stopPropagation(); // agar tidak dobel dari parent
        switchToLobby();
      });
    }

    // OPSIONAL: jika pengguna ingin kembali ke building? tidak diperlukan, 
    // karena fokus ke ground dan tombol-tombol. 
    // Namun kita bisa sediakan cara "kembali" jika dikehendaki? abaikan sesuai permintaan.

    // jaga jika ada klik di container tombol tidak memicu switch ( sudah stopPropagation )
    // tapi karena tombol-tombol adalah link, akan membuka halaman.

    // untuk memastikan background gelap konsisten, tidak perlu tambahan.

    // juga karena ada kemungkinan link dibuka di tab baru (target blank), sesuai keinginan.

    // Tampilkan fallback jika building.png & lobby.png tidak ada: kita sudah pakai SVG ilustratif.
    // Untuk penggunaan sungguhan, ganti url di style attribute atau di css class dengan file asli.
    // contoh: scene-building style background-image: url('building.png');
    // scene-lobby style background-image: url('lobby.png');

    console.log('Kachoo Building siap - klik area gelap untuk masuk lobby');
  })();
</script>

<!-- jika ingin ganti gambar dengan file asli, cukup ganti background image inline atau via class.
     tapi karena environment tidak memiliki file, kita gunakan svg ilustrasi dengan gaya bangunan dan lobby.
     Sudah termasuk rada gelap via overlay after. -->

<!-- tambahan sedikit style untuk memastikan scene hidden tidak terlihat -->
<style>
  .hidden {
    display: none !important;
  }
  #scene-lobby {
    display: flex; /* akan di-override hidden */
  }
  #scene-lobby.hidden {
    display: none !important;
  }
  /* saat transisi, kita atur display: flex */
  #scene-lobby:not(.hidden) {
    display: block;
  }
  .scene {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
  /* pastikan scene-building juga absolute */
  #scene-building {
    position: absolute;
  }
  /* konten tombol lebih rapi */
  .button-container a {
    text-decoration: none;
  }
  /* background agak gelap via pseudo, jadi tidak perlu terlalu hitam */
  .scene::after {
    background-color: rgba(0, 0, 0, 0.25);
  }
  /* untuk lobby bisa sedikit lebih gelap jika ingin */
  #scene-lobby::after {
    background-color: rgba(0, 0, 0, 0.2);
  }
  /* sentuhan gradasi halus */
  .button-container {
    background: rgba(15, 25, 35, 0.65);
  }
</style>

</body>
    </html>
