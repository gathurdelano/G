<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KACHOO EXHIBITION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* enhanced lighting */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 90% 70%, rgba(255,255,255,0.12) 0%, transparent 55%),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        .floor-glow {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        .main-container {
            width: 100%;
            max-width: 500px;
            padding: 0.5rem;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: space-between;
            margin: 0 auto;
        }

        /* INTRO OVERLAY - tombol besar */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
            padding: 1rem;
        }

        .intro-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .intro-card {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background: rgba(15,15,15,0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 2.5rem 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05) inset, 0 0 40px rgba(255,255,255,0.15);
            border-radius: 16px;
        }

        .intro-card p {
            font-size: 1.5rem;
            line-height: 1.5;
            font-weight: 300;
            letter-spacing: 3px;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
            margin-bottom: 2.5rem;
        }

        /* TOMBOL ENTER BESAR DAN MUDAH DIKLIK */
        .intro-next {
            background: transparent;
            border: 2px solid #ffffff;
            color: #ffffff;
            padding: 1.2rem 2rem;
            font-size: 1.3rem;
            font-weight: 500;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 60px; /* rounded tapi tetap jelas */
            box-shadow: 0 0 25px rgba(255,255,255,0.3);
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
            min-height: 65px; /* tinggi minimal untuk sentuhan */
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        .intro-next:active {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 40px #ffffff;
            transform: scale(0.98);
        }

        /* header */
        .exhibition-header {
            text-align: center;
            margin: 0.8rem 0 0.5rem;
            z-index: 15;
        }

        .exhibition-header h1 {
            font-size: clamp(1.8rem, 7vw, 2.5rem);
            font-weight: 500;
            letter-spacing: 4px;
            color: #ffffff;
            text-shadow: 0 0 20px #ffffff, 0 0 40px rgba(255,255,255,0.3);
            line-height: 1.2;
        }

        /* carousel stage */
        .carousel-stage {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 0 1 auto;
            margin: 0.2rem 0;
        }

        /* pedestal */
        .pedestal {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin: 0 auto;
        }

        .table-base {
            position: absolute;
            bottom: 0;
            width: 85%;
            left: 7.5%;
            height: 85px;
            background: linear-gradient(145deg, #3a3a3a, #1e1e1e);
            border-radius: 12px 12px 0 0;
            box-shadow: 
                0 -3px 10px rgba(255,255,255,0.15),
                0 20px 30px rgba(0,0,0,0.9),
                0 0 0 1px rgba(255,255,255,0.2) inset,
                0 0 35px rgba(255,255,255,0.15);
            transform: perspective(400px) rotateX(2deg);
            border-top: 2px solid rgba(255,255,255,0.3);
        }

        .table-light {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 70px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.6) 0%, transparent 80%);
            border-radius: 50%;
            filter: blur(20px);
            opacity: 0.7;
            mix-blend-mode: screen;
        }

        /* produk container */
        .product-float {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 250px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 25;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.8)) drop-shadow(0 0 20px rgba(255,255,255,0.3));
            animation: floatGlow 5s infinite alternate ease-in-out;
        }

        .product-float img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(1.1) contrast(1.1) drop-shadow(0 0 15px rgba(255,255,255,0.4));
        }

        @keyframes floatGlow {
            0% { transform: translateX(-50%) translateY(0px); filter: drop-shadow(0 10px 15px #000) drop-shadow(0 0 10px #fff); }
            100% { transform: translateX(-50%) translateY(-8px); filter: drop-shadow(0 15px 25px #000) drop-shadow(0 0 25px #fff); }
        }

        /* SLIDE CONTROLS - TOMBOL BESAR UNTUK MOBILE */
        .slide-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2.5rem;
            margin: 1.5rem 0 1rem;
            z-index: 30;
        }

        .slide-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.5);
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
            outline: none;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        /* area klik lebih besar dari visual */
        .slide-btn::after {
            content: '';
            position: absolute;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: transparent;
        }

        .slide-btn:active:not(:disabled) {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 45px #ffffff;
            transform: scale(0.95);
        }

        .slide-btn:disabled {
            opacity: 0.2;
            border-color: rgba(255,255,255,0.2);
            cursor: not-allowed;
            box-shadow: none;
        }

        .slide-btn svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        .counter {
            font-size: 1.1rem;
            letter-spacing: 3px;
            color: #ffffff;
            border-bottom: 1px solid rgba(255,255,255,0.4);
            padding-bottom: 5px;
            min-width: 75px;
            text-align: center;
            font-weight: 300;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        /* footer */
        .footer {
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            color: #aaaaaa;
            padding: 0.8rem 0 0.3rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            margin: 0.5rem auto 0;
            text-transform: uppercase;
            font-weight: 200;
        }

        /* landscape */
        @media (orientation: landscape) and (max-height: 600px) {
            .pedestal { height: 220px; }
            .product-float { width: 170px; height: 170px; bottom: 55px; }
            .slide-btn { width: 60px; height: 60px; }
            .slide-btn svg { width: 28px; height: 28px; }
        }

        /* small phones */
        @media (max-width: 360px) {
            .pedestal { height: 260px; }
            .product-float { width: 210px; height: 210px; }
            .slide-btn { width: 65px; height: 65px; }
        }
    </style>
</head>
<body>
    <!-- INTRO OVERLAY -->
    <div class="intro-overlay" id="introOverlay">
        <div class="intro-card">
            <p>KACHOO<br>EXHIBITION</p>
            <button class="intro-next" id="introNextBtn">ENTER GALLERY</button>
        </div>
    </div>

    <div class="main-container">
        <header class="exhibition-header">
            <h1>KACHOO EXHIBITION</h1>
        </header>

        <!-- AREA CAROUSEL -->
        <div class="carousel-stage">
            <div class="pedestal">
                <div class="table-base"></div>
                <div class="table-light"></div>
                <div class="product-float" id="productImageContainer">
                    <img id="displayImage" src="" alt="exhibit">
                </div>
            </div>
        </div>

        <!-- SLIDE CONTROLS - TOMBOL BESAR -->
        <div class="slide-controls">
            <button class="slide-btn" id="prevBtn" disabled>
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <div class="counter" id="counter">1 / 8</div>
            <button class="slide-btn" id="nextBtn">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
        </div>

        <footer class="footer">
            For Roleplay Purpose Only · Kachoo 2026
        </footer>
    </div>

    <script>
        (function() {
            // INTRO - tombol besar mudah diklik
            const intro = document.getElementById('introOverlay');
            const introBtn = document.getElementById('introNextBtn');
            
            introBtn.addEventListener('click', function(e) {
                e.preventDefault();
                intro.classList.add('hidden');
            });

            // DAFTAR PRODUK
            const productFiles = [
                'Choosic1.png',
                'Choosic2.png',
                'Choosic3.png',
                'Choosic4.png',
                'Chozy1.png',
                'Chozy2.png',
                'Produk1.png',
                'Produk2.png'
            ];
            
            const basePath = 'products/';
            const products = productFiles.map(file => basePath + file);

            const imgElement = document.getElementById('displayImage');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const counter = document.getElementById('counter');

            let currentIndex = 0;
            const totalProducts = products.length;

            function updateDisplay() {
                imgElement.src = products[currentIndex];
                counter.innerText = (currentIndex + 1) + ' / ' + totalProducts;
                prevBtn.disabled = (currentIndex === 0);
                nextBtn.disabled = (currentIndex === totalProducts - 1);
            }

            // Event listeners dengan touch support
            prevBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (currentIndex > 0) {
                    currentIndex--;
                    updateDisplay();
                }
            });

            nextBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (currentIndex < totalProducts - 1) {
                    currentIndex++;
                    updateDisplay();
                }
            });

            // Tambahan touch event untuk responsivitas lebih baik
            [prevBtn, nextBtn, introBtn].forEach(btn => {
                btn.addEventListener('touchstart', function(e) {
                    e.preventDefault(); // Mencegah double-tap zoom
                }, { passive: false });
            });

            updateDisplay();

            // Error handling untuk gambar
            imgElement.onerror = function() {
                console.log('Image not found:', imgElement.src);
                // Tetap tampilkan tanpa error visual
            };
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
</body>
                </html>
