<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>KACHOO EXHIBITION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* enhanced lighting: multiple spotlights, rim lights, and soft glow */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.12) 0%, transparent 35%),
                radial-gradient(circle at 90% 70%, rgba(255,255,255,0.15) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(255,255,255,0.08) 0%, transparent 30%),
                radial-gradient(circle at 70% 20%, rgba(255,255,255,0.1) 0%, transparent 45%),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 1;
        }

        /* extra top/bottom rim lighting */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
            pointer-events: none;
            z-index: 1;
        }

        .floor-glow {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.2) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        .main-container {
            width: 100%;
            max-width: 1400px;
            padding: 1rem 1rem;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
        }

        /* intro overlay */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s cubic-bezier(0.23, 1, 0.32, 1), visibility 0.8s;
            padding: 1.5rem;
            will-change: opacity;
        }

        .intro-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .intro-card {
            max-width: 90%;
            width: 600px;
            text-align: center;
            background: rgba(10,10,10,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 2.5rem 1.5rem;
            box-shadow: 0 30px 50px rgba(0,0,0,0.9), 0 0 0 2px rgba(255,255,255,0.02) inset, 0 0 60px rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        .intro-card p {
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            line-height: 1.6;
            font-weight: 300;
            letter-spacing: 2px;
            color: #f0f0f0;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
            margin-bottom: 2.5rem;
            word-break: keep-all;
        }

        .intro-next {
            background: transparent;
            border: 2px solid #ffffff;
            color: #ffffff;
            padding: 0.8rem 2.5rem;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 2px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .intro-next:hover {
            background: #ffffff;
            color: #000000;
            box-shadow: 0 0 45px #ffffff;
        }

        /* header */
        .exhibition-header {
            text-align: center;
            margin-bottom: 2rem;
            z-index: 15;
            position: relative;
        }

        .exhibition-header h1 {
            font-size: clamp(2.5rem, 10vw, 4.5rem);
            font-weight: 500;
            letter-spacing: clamp(4px, 2vw, 12px);
            color: #ffffff;
            text-shadow: 0 0 30px #ffffff, 0 0 60px rgba(255,255,255,0.3);
            margin-bottom: 0.5rem;
            word-break: keep-all;
            line-height: 1.2;
        }

        /* carousel wrapper */
        .carousel-stage {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1 0 auto;
            min-height: 400px;
            margin: 0.5rem 0 1rem;
            z-index: 20;
        }

        /* pedestal (meja putih dengan lampu) - responsif */
        .pedestal {
            position: relative;
            width: min(700px, 90vw);
            height: clamp(250px, 40vw, 380px);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none;
        }

        .table-base {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: clamp(90px, 15vw, 140px);
            background: linear-gradient(145deg, #3a3a3a, #1e1e1e);
            border-radius: 4px 4px 0 0;
            box-shadow: 
                0 -5px 15px rgba(255,255,255,0.2),
                0 25px 40px rgba(0,0,0,0.8),
                0 0 0 1px rgba(255,255,255,0.3) inset,
                0 0 50px rgba(255,255,255,0.2);
            transform: perspective(800px) rotateX(2deg);
            border-top: 2px solid rgba(255,255,255,0.4);
        }

        /* lampu (sumber cahaya terpusat) */
        .table-light {
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: min(250px, 50vw);
            height: clamp(60px, 12vw, 100px);
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.7) 0%, transparent 80%);
            border-radius: 50%;
            filter: blur(25px);
            opacity: 0.8;
            mix-blend-mode: screen;
            pointer-events: none;
        }

        /* additional accent lights */
        .spot-left {
            position: absolute;
            left: -100px;
            top: 50px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, transparent 80%);
            filter: blur(50px);
            z-index: 0;
        }

        .spot-right {
            position: absolute;
            right: -100px;
            bottom: 20px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 80%);
            filter: blur(50px);
            z-index: 0;
        }

        /* produk container (png terapung) */
        .product-float {
            position: absolute;
            bottom: clamp(70px, 12vw, 115px); /* duduk di atas meja */
            left: 50%;
            transform: translateX(-50%);
            width: min(500px, 70vw);
            max-width: 800px;
            aspect-ratio: 1/1;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 25;
            filter: drop-shadow(0 30px 40px rgba(0,0,0,0.6)) drop-shadow(0 0 30px rgba(255,255,255,0.3));
            animation: floatGlow 6s infinite alternate ease-in-out;
        }

        .product-float img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            image-rendering: high-quality;
            filter: brightness(1.1) contrast(1.1) drop-shadow(0 0 25px rgba(255,255,255,0.4));
            pointer-events: none;
        }

        @keyframes floatGlow {
            0% { transform: translateX(-50%) translateY(0px); filter: drop-shadow(0 20px 25px #000000) drop-shadow(0 0 15px #ffffff); }
            100% { transform: translateX(-50%) translateY(-12px); filter: drop-shadow(0 30px 35px #000000) drop-shadow(0 0 35px #ffffff); }
        }

        /* navigasi slide */
        .slide-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(1.5rem, 5vw, 3rem);
            margin: 1.5rem 0 2rem;
            z-index: 30;
            position: relative;
            flex-wrap: wrap;
        }

        .slide-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.5);
            color: white;
            font-size: 2.5rem;
            width: clamp(50px, 12vw, 70px);
            height: clamp(50px, 12vw, 70px);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            outline: none;
        }

        .slide-btn:hover:not(:disabled) {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 50px #ffffff;
        }

        .slide-btn:disabled {
            opacity: 0.2;
            border-color: rgba(255,255,255,0.2);
            cursor: not-allowed;
            box-shadow: none;
        }

        .slide-btn svg {
            width: clamp(20px, 5vw, 30px);
            height: clamp(20px, 5vw, 30px);
            fill: currentColor;
        }

        .counter {
            font-size: clamp(1rem, 4vw, 1.2rem);
            letter-spacing: 4px;
            color: #dddddd;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 6px;
            min-width: 80px;
            text-align: center;
        }

        /* footer kecil */
        .footer {
            text-align: center;
            font-size: clamp(0.7rem, 3vw, 0.8rem);
            letter-spacing: 2px;
            color: #aaaaaa;
            padding: 1rem 0 0.3rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 600px;
            margin: 1rem auto 0;
            text-transform: uppercase;
            font-weight: 300;
            z-index: 20;
            position: relative;
        }

        /* fallback style jika gambar tidak ditemukan */
        .product-float img {
            background-color: transparent !important;
        }
    </style>
</head>
<body>
    <div class="floor-glow"></div>
    <div class="spot-left"></div>
    <div class="spot-right"></div>

    <!-- INTRO OVERLAY -->
    <div class="intro-overlay" id="introOverlay">
        <div class="intro-card">
            <p>EXHIBITION PREVIEW<br>— KACHOO —<br>BLACK & WHITE SERIES</p>
            <button class="intro-next" id="introNextBtn">→ ENTER GALLERY ←</button>
        </div>
    </div>

    <div class="main-container">
        <header class="exhibition-header">
            <h1>KACHOO EXHIBITION</h1>
        </header>

        <!-- AREA CAROUSEL DENGAN MEJA & LAMPU -->
        <div class="carousel-stage">
            <div class="pedestal">
                <div class="table-base"></div>
                <div class="table-light"></div>
                <!-- produk PNG transparan yang melayang -->
                <div class="product-float" id="productImageContainer">
                    <img id="displayImage" src="" alt="exhibit png">
                </div>
            </div>
        </div>

        <!-- SLIDE CONTROLS -->
        <div class="slide-controls">
            <button class="slide-btn" id="prevBtn" disabled>
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <div class="counter" id="counter">1 / 8</div>
            <button class="slide-btn" id="nextBtn">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
        </div>

        <footer class="footer">
            For Roleplay Purpose Only, Kachoo 2026
        </footer>
    </div>

    <script>
        (function() {
            // INTRO LOGIC
            const intro = document.getElementById('introOverlay');
            const introBtn = document.getElementById('introNextBtn');
            
            introBtn.addEventListener('click', function() {
                intro.classList.add('hidden');
            });

            // DAFTAR PRODUK PNG (nama file sesuai permintaan)
            // Semua file diharapkan berada di folder "products/" dengan ukuran 800x800px transparan
            const productFiles = [
                'Choosic1.png',
                'Choosic2.png',
                'Choosic3.png',
                'Choosic4.png',
                'Chozy1.png',
                'Chozy2.png',
                'Produk1.png',
                'Produk2.png'
            ];
            
            // Base path - asumsi semua PNG disimpan di subfolder "products"
            // Jika file berada di lokasi berbeda, ubah basePath sesuai kebutuhan
            const basePath = 'products/';  // pastikan folder 'products' ada dan berisi file-file tersebut
            
            // Membuat array lengkap dengan path
            const products = productFiles.map(file => basePath + file);

            // Elemen DOM
            const imgElement = document.getElementById('displayImage');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const counter = document.getElementById('counter');

            let currentIndex = 0; // 0-based
            const totalProducts = products.length;

            // Fungsi untuk update gambar dan status tombol
            function updateDisplay() {
                // Set sumber gambar
                imgElement.src = products[currentIndex];
                
                // Update counter
                counter.innerText = (currentIndex + 1) + ' / ' + totalProducts;
                
                // Update tombol disabled jika mentok
                prevBtn.disabled = (currentIndex === 0);
                nextBtn.disabled = (currentIndex === totalProducts - 1);

                // Tambahan: menangani error jika gambar tidak ditemukan
                imgElement.onerror = function() {
                    console.error('Gambar tidak ditemukan:', products[currentIndex]);
                    // Bisa menampilkan placeholder atau pesan error
                    // Untuk sementara, biarkan broken image, atau bisa ganti dengan SVG fallback
                    // Tapi karena ini hanya roleplay, kita diamkan saja.
                };
            }

            // Event listener untuk navigasi
            prevBtn.addEventListener('click', function() {
                if (currentIndex > 0) {
                    currentIndex--;
                    updateDisplay();
                }
            });

            nextBtn.addEventListener('click', function() {
                if (currentIndex < totalProducts - 1) {
                    currentIndex++;
                    updateDisplay();
                }
            });

            // Inisialisasi gambar pertama
            updateDisplay();

            // Tambahan sentuhan: jika layar disentuh, tidak ada perubahan (murni tombol)
        })();
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
</body>
                    </html>
