<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KACHOO EXHIBITION — LIGHT & AUDIO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 0 16px;
            overflow-x: hidden;
        }

        /* === HALUS LIGHTING LAYER (belakang & sekitar produk) === */
        .ambient-light {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 35%, rgba(255,210,140,0.2) 0%, rgba(0,0,0,0.75) 80%);
            pointer-events: none;
            z-index: 1;
        }

        /* spotlight utama - fokus ke area produk */
        .main-spot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse 55% 40% at 50% 38%, rgba(255,245,210,0.3) 0%, rgba(0,0,0,0.6) 80%);
            pointer-events: none;
            z-index: 2;
        }

        /* efek rim light belakang produk (glow halus) */
        .back-rim {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(255,180,100,0.25) 0%, transparent 70%);
            pointer-events: none;
            z-index: 2;
            filter: blur(35px);
        }

        /* floor glow bawah (tag name area) */
        .floor-name-glow {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 140px;
            background: radial-gradient(ellipse at center, rgba(255,220,150,0.35) 0%, transparent 85%);
            pointer-events: none;
            z-index: 2;
            filter: blur(12px);
        }

        /* container utama */
        .container {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: center;
            align-items: center;
            padding: 20px 0 30px;
        }

        /* INTRO OVERLAY */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.5s ease;
            backdrop-filter: blur(2px);
        }

        .intro-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .intro-card {
            width: 100%;
            max-width: 340px;
            background: rgba(10,10,10,0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,215,150,0.6);
            border-radius: 32px;
            padding: 36px 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 35px rgba(255,200,100,0.3);
        }

        .intro-card p {
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 3px;
            margin-bottom: 32px;
            line-height: 1.4;
            text-shadow: 0 0 12px #ffcc88;
        }

        .intro-btn {
            background: transparent;
            border: 1.5px solid #ffddaa;
            color: #ffefcf;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 3px;
            padding: 14px 32px;
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 12px rgba(255,210,120,0.5);
        }

        .intro-btn:active {
            background: #ffdbaa;
            color: #000;
            box-shadow: 0 0 30px #ffc285;
        }

        /* HEADER: tulisan KACHOO EXHIBITION DIPERBESAR dan berada DI ATAS PRODUK */
        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            position: relative;
            z-index: 25;
        }

        .header h1 {
            font-size: clamp(2.4rem, 10vw, 3.8rem);
            font-weight: 700;
            letter-spacing: 6px;
            text-shadow: 0 0 25px #fff5e0, 0 0 35px rgba(255,200,100,0.8);
            background: linear-gradient(135deg, #fff8f0, #ffeaac);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            word-break: keep-all;
        }

        /* area utama: produk melayang, besar, CENTER */
        .hero-product {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            margin: 10px 0 20px;
            position: relative;
        }

        .product-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            position: relative;
            margin: 0 auto;
        }

        .product-frame {
            width: 320px;
            height: 320px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 25px 35px rgba(0,0,0,0.6)) drop-shadow(0 0 35px rgba(255,220,150,0.5));
            animation: floatPremium 3.2s infinite alternate ease-in-out;
            position: relative;
            background: transparent;
        }

        /* produk diperbesar (ukuran lebih besar) */
        .product-frame img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(1.08) contrast(1.02) drop-shadow(0 0 18px rgba(255,210,130,0.4));
            transition: filter 0.3s;
            display: block;
        }

        /* efek melayang lebih halus dan elegan */
        @keyframes floatPremium {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-14px) rotate(0.5deg); }
        }

        /* lighting belakang produk ditambah (glow besar dari belakang) */
        .back-glow-product {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 380px;
            height: 380px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255,200,100,0.45) 0%, rgba(255,160,80,0.2) 40%, transparent 80%);
            filter: blur(38px);
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
        }

        /* tambahan rim belakang extra */
        .extra-back-lighting {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 450px;
            height: 450px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255,180,90,0.3) 0%, rgba(255,120,40,0) 70%);
            filter: blur(55px);
            z-index: -2;
            pointer-events: none;
        }

        /* TAG NAME dibawah produk: product 1, product 2 dst */
        .product-tag {
            margin-top: 35px;
            text-align: center;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid rgba(255,220,160,0.5);
            box-shadow: 0 0 20px rgba(255,180,80,0.3);
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 2px;
            color: #fff4e0;
            width: auto;
            min-width: 160px;
        }

        .tag-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        /* navigation tetap fungsional */
        .navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 42px;
            margin: 28px 0 12px;
        }

        .nav-btn {
            background: rgba(20,20,20,0.7);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,215,150,0.7);
            color: #ffefcf;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 12px rgba(255,180,100,0.3);
        }

        .nav-btn:active {
            background: #ffd89a;
            color: #1e1e1e;
            border-color: #fff0c0;
            box-shadow: 0 0 28px #ffc285;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            border-color: rgba(255,215,150,0.3);
            pointer-events: none;
        }

        .nav-btn svg {
            width: 32px;
            height: 32px;
            fill: currentColor;
        }

        .counter {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.5);
            padding: 6px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255,210,130,0.4);
            backdrop-filter: blur(4px);
        }

        .footer {
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #b9aa8a;
            padding: 18px 0 10px;
            border-top: 1px solid rgba(255,215,150,0.2);
            margin-top: 12px;
            width: 100%;
        }

        /* RESPONSIVE: produk tetap besar dan center */
        @media (max-width: 480px) {
            .product-frame {
                width: 260px;
                height: 260px;
            }
            .back-glow-product {
                width: 320px;
                height: 320px;
            }
            .header h1 {
                font-size: clamp(2rem, 8vw, 3rem);
                letter-spacing: 3px;
            }
            .product-tag {
                font-size: 1rem;
                padding: 6px 18px;
            }
        }

        @media (max-width: 380px) {
            .product-frame {
                width: 220px;
                height: 220px;
            }
            .back-glow-product {
                width: 280px;
                height: 280px;
            }
        }

        @media (orientation: landscape) and (max-height: 550px) {
            .container {
                padding: 12px 0;
            }
            .product-frame {
                width: 190px;
                height: 190px;
            }
            .header h1 {
                font-size: 2rem;
            }
            .navigation {
                margin: 12px 0;
            }
            .product-tag {
                margin-top: 16px;
            }
        }

        /* audio hint kecil (opsional) */
        .audio-hint {
            position: fixed;
            bottom: 12px;
            right: 12px;
            font-size: 10px;
            color: rgba(255,220,150,0.5);
            background: rgba(0,0,0,0.4);
            padding: 4px 10px;
            border-radius: 20px;
            z-index: 50;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <!-- LAYER LIGHTING HALUS & BELAKANG PRODUK DITAMBAH -->
    <div class="ambient-light"></div>
    <div class="main-spot"></div>
    <div class="back-rim"></div>
    <div class="floor-name-glow"></div>

    <!-- INTRO OVERLAY -->
    <div class="intro-overlay" id="introOverlay">
        <div class="intro-card">
            <p>KACHOO<br>EXHIBITION</p>
            <button class="intro-btn" id="introBtn">ENTER</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container">
        <header class="header">
            <h1>KACHOO EXHIBITION</h1>
        </header>

        <div class="hero-product">
            <div class="product-wrapper">
                <!-- lighting belakang extra ditambah (sesuai permintaan) -->
                <div class="extra-back-lighting"></div>
                <div class="back-glow-product"></div>
                <div class="product-frame" id="productFrame">
                    <img id="productImage" src="" alt="exhibit product">
                </div>
            </div>
            <!-- TAG NAME dibawah: product 1, product 2, ... (sesuai urutan) -->
            <div class="tag-container">
                <div class="product-tag" id="productTagName">Product 1</div>
            </div>
        </div>

        <!-- NAVIGATION -->
        <div class="navigation">
            <button class="nav-btn" id="prevBtn" disabled>
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <div class="counter" id="counter">1/8</div>
            <button class="nav-btn" id="nextBtn">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
        </div>

        <footer class="footer">
            For Roleplay Purpose Only · Kachoo 2026
        </footer>
    </div>
    <div class="audio-hint">🎧 AUDIO READY</div>

    <script>
        (function() {
            // --- INTRO OVERLAY ---
            const intro = document.getElementById('introOverlay');
            const introBtn = document.getElementById('introBtn');
            
            // --- AUTOMATIC AUDIO dengan exhibition.mp3 (sesuai permintaan) ---
            let audioPlayer = null;
            let audioStarted = false;

            function initAndPlayAudio() {
                if (audioStarted) return;
                try {
                    audioPlayer = new Audio('exhibition.mp3');
                    audioPlayer.loop = true;   // looping biar atmosferik, bisa dihentikan jika mau
                    audioPlayer.volume = 0.75;
                    // Play promise untuk handle autoplay policy
                    const playPromise = audioPlayer.play();
                    if (playPromise !== undefined) {
                        playPromise.then(() => {
                            console.log('Automatic audio exhibition.mp3 started');
                            audioStarted = true;
                        }).catch(err => {
                            console.warn('Audio autoplay blocked, but user will interact via ENTER already:', err);
                            // karena ENTER sudah diklik, kita coba lagi setelah user click
                        });
                    }
                } catch(e) {
                    console.log('Audio file error, pastikan exhibition.mp3 tersedia', e);
                }
            }

            // Saat ENTER ditekan, kita hapus overlay sekaligus pastikan audio berjalan
            introBtn.addEventListener('click', function() {
                intro.classList.add('hidden');
                // inisialisasi audio jika belum (otomatis)
                if (!audioStarted) {
                    initAndPlayAudio();
                }
            });

            // Fallback: jika intro sudah di-skip mungkin audio tetap siap
            // tetapi karena kita butuh auto audio setelah user interaksi (ENTER), sudah sesuai.

            // --- DATA PRODUK (sesuai daftar asli dengan nama file gambar) ---
            const products = [
                'Choosic1.png',
                'Choosic2.png',
                'Choosic3.png',
                'Choosic4.png',
                'Chozy1.png',
                'Chozy2.png',
                'Produk1.png',
                'Produk2.png'
            ];

            // Tag names: product 1, product 2 ... product 8
            const productTags = [
                'Product 1',
                'Product 2',
                'Product 3',
                'Product 4',
                'Product 5',
                'Product 6',
                'Product 7',
                'Product 8'
            ];

            const img = document.getElementById('productImage');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const counter = document.getElementById('counter');
            const productTagSpan = document.getElementById('productTagName');

            let currentIndex = 0;

            function updateDisplay() {
                // perbesar produk sudah diatur lewat CSS ukuran frame 320x320, gambar tetap proporsional
                img.src = products[currentIndex];
                counter.textContent = (currentIndex + 1) + '/' + products.length;
                // update tag name sesuai permintaan: product 1, product 2, dst
                productTagSpan.textContent = productTags[currentIndex];
                
                prevBtn.disabled = currentIndex === 0;
                nextBtn.disabled = currentIndex === products.length - 1;

                // efek kecil: tambah class transisi halus
                img.style.opacity = '0.95';
                setTimeout(() => { if(img) img.style.opacity = '1'; }, 50);
            }

            prevBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (currentIndex > 0) {
                    currentIndex--;
                    updateDisplay();
                }
            });

            nextBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (currentIndex < products.length - 1) {
                    currentIndex++;
                    updateDisplay();
                }
            });

            // Error handling gambar (tetap tanpa placeholder agar transparan)
            img.onerror = function() {
                console.warn('Image not loaded:', img.src);
                // biarkan transparan, tidak merusak estetika
            };

            updateDisplay();

            // optional: tambahkan efek lighting dinamis mengikuti produk (halus)
            // tidak perlu intervensi berlebihan, lighting sudah fixed halus & belakang produk ditambah
            // pastikan "meja" sudah dihilangkan seluruhnya (tidak ada elemen pedestal/table-base)
            // code di atas sudah tidak mengandung meja atau pedestal manapun.

            // (Tambahan) jika audio belum keplay karena user langsung skip tanpa interaksi? user wajib klik enter, sudah aman.
            // Untuk keperluan background yang lebih halus, tambahkan efek sinar dinamis ringan saat ganti produk
            const backGlow = document.querySelector('.back-glow-product');
            if(backGlow) {
                // efek subtle perubahan intensitas saat ganti produk
                const changeLight = () => {
                    backGlow.style.transition = 'opacity 0.3s';
                    backGlow.style.opacity = '0.7';
                    setTimeout(() => { if(backGlow) backGlow.style.opacity = '1'; }, 150);
                };
                const observer = new MutationObserver(() => changeLight());
                observer.observe(img, { attributes: true, attributeFilter: ['src'] });
            }
        })();
    </script>
</body>
    </html>
