<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KACHOO EXHIBITION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 0 12px;
        }

        /* LIGHTING EFFECT */
        .light-spot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 20%, rgba(255,255,255,0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 1;
        }

        .floor-glow {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.2) 0%, transparent 80%);
            pointer-events: none;
            z-index: 1;
        }

        /* MAIN CONTAINER */
        .container {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: space-between;
            padding: 16px 0 0;
        }

        /* INTRO OVERLAY - simple dan functional */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.4s ease;
        }

        .intro-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .intro-card {
            width: 100%;
            max-width: 340px;
            background: rgba(20,20,20,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 30px rgba(255,255,255,0.1);
        }

        .intro-card p {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 32px;
            line-height: 1.5;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* TOMBOL ENTER - simple, mudah diklik, ga perlu besar banget */
        .intro-btn {
            background: transparent;
            border: 1.5px solid #fff;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 3px;
            padding: 14px 28px;
            border-radius: 40px;
            width: fit-content;
            margin: 0 auto;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
            min-width: 180px;
        }

        .intro-btn:active {
            background: #fff;
            color: #000;
            box-shadow: 0 0 30px #fff;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin: 8px 0 16px;
        }

        .header h1 {
            font-size: clamp(1.8rem, 7vw, 2.4rem);
            font-weight: 500;
            letter-spacing: 4px;
            text-shadow: 0 0 20px #fff, 0 0 40px rgba(255,255,255,0.3);
        }

        /* EXHIBITION AREA */
        .exhibition-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            margin: 0;
            min-height: 380px;
        }

        /* PEDESTAL (MEJA) - dibuat sampai bawah tidak melayang */
        .pedestal {
            position: relative;
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: auto;
        }

        /* Meja yang solid sampai bawah */
        .table-base {
            width: 100%;
            background: linear-gradient(145deg, #2a2a2a, #121212);
            border-radius: 12px 12px 0 0;
            box-shadow: 
                0 -5px 20px rgba(255,255,255,0.15),
                0 10px 30px rgba(0,0,0,0.5),
                0 0 0 1px rgba(255,255,255,0.2) inset;
            position: relative;
            z-index: 2;
        }

        /* Bagian atas meja (permukaan) */
        .table-surface {
            height: 55px;
            background: linear-gradient(135deg, #3a3a3a, #1e1e1e);
            border-radius: 12px 12px 0 0;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            position: relative;
        }

        /* Efek cahaya di permukaan meja */
        .table-surface::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.2) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Bagian kaki meja (solid sampai bawah) */
        .table-legs {
            background: linear-gradient(90deg, #1a1a1a, #0a0a0a, #1a1a1a);
            height: 100%;
            min-height: 80px;
            display: flex;
            justify-content: space-around;
            gap: 20px;
            padding: 0 20px;
            position: relative;
        }

        .leg {
            flex: 1;
            background: linear-gradient(180deg, #252525, #0a0a0a);
            border-radius: 0 0 8px 8px;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.1), 0 5px 15px rgba(0,0,0,0.5);
            min-height: 80px;
        }

        /* Efek cahaya di bawah meja */
        .under-glow {
            position: absolute;
            bottom: -10px;
            left: 10%;
            width: 80%;
            height: 30px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.2) 0%, transparent 80%);
            filter: blur(10px);
            pointer-events: none;
            z-index: 1;
        }

        /* Tempat produk dengan efek melayang di atas meja */
        .product-display {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            z-index: 10;
        }

        .product-container {
            width: 220px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 15px 20px rgba(0,0,0,0.6)) drop-shadow(0 0 25px rgba(255,255,255,0.2));
            animation: float 3s infinite alternate ease-in-out;
            pointer-events: none;
            position: relative;
            background: transparent;
        }

        .product-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(1.05) drop-shadow(0 0 10px rgba(255,255,255,0.2));
            display: block;
        }

        /* Animasi melayang */
        @keyframes float {
            0% { 
                transform: translateY(0px); 
            }
            100% { 
                transform: translateY(-12px); 
            }
        }

        /* Efek sinar dari atas ke produk */
        .spotlight {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 100px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.4) 0%, transparent 70%);
            filter: blur(20px);
            pointer-events: none;
            z-index: 5;
        }

        /* NAVIGASI - simple dan functional */
        .navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            margin: 24px 0 16px;
        }

        .nav-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
            touch-action: manipulation;
            padding: 0;
        }

        .nav-btn:active {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 25px #fff;
        }

        .nav-btn:disabled {
            opacity: 0.2;
            border-color: rgba(255,255,255,0.2);
            pointer-events: none;
        }

        .nav-btn svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        .counter {
            font-size: 1rem;
            letter-spacing: 2px;
            color: #ddd;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 4px;
            min-width: 65px;
            text-align: center;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #999;
            padding: 16px 0 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 8px;
        }

        /* RESPONSIVE */
        @media (max-width: 360px) {
            .product-container { width: 180px; height: 180px; }
            .table-surface { height: 45px; }
            .leg { min-height: 60px; }
            .nav-btn { width: 44px; height: 44px; }
            .nav-btn svg { width: 24px; height: 24px; }
            .exhibition-area { min-height: 340px; }
        }

        @media (max-width: 480px) and (min-height: 700px) {
            .leg { min-height: 100px; }
            .exhibition-area { min-height: 420px; }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .container { min-height: auto; }
            .product-container { width: 140px; height: 140px; }
            .exhibition-area { min-height: 280px; }
            .table-surface { height: 35px; }
            .leg { min-height: 50px; }
            .header { margin: 4px 0; }
        }

        /* Pastikan produk benar-benar transparan */
        img {
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="light-spot"></div>
    <div class="floor-glow"></div>

    <!-- INTRO OVERLAY -->
    <div class="intro-overlay" id="introOverlay">
        <div class="intro-card">
            <p>KACHOO<br>EXHIBITION</p>
            <button class="intro-btn" id="introBtn">ENTER</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container">
        <header class="header">
            <h1>KACHOO EXHIBITION</h1>
        </header>

        <div class="exhibition-area">
            <div class="pedestal">
                <!-- Tempat produk dengan efek melayang di atas meja -->
                <div class="product-display">
                    <div class="spotlight"></div>
                    <div class="product-container" id="productContainer">
                        <img id="productImage" src="" alt="product">
                    </div>
                </div>
                
                <!-- Meja solid sampai bawah -->
                <div class="table-base">
                    <div class="table-surface"></div>
                    <div class="table-legs">
                        <div class="leg"></div>
                        <div class="leg"></div>
                        <div class="leg"></div>
                    </div>
                </div>
                <div class="under-glow"></div>
            </div>
        </div>

        <!-- NAVIGATION -->
        <div class="navigation">
            <button class="nav-btn" id="prevBtn" disabled>
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <div class="counter" id="counter">1/8</div>
            <button class="nav-btn" id="nextBtn">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
        </div>

        <footer class="footer">
            For Roleplay Purpose Only · Kachoo 2026
        </footer>
    </div>

    <script>
        (function() {
            // INTRO
            const intro = document.getElementById('introOverlay');
            const introBtn = document.getElementById('introBtn');
            
            introBtn.addEventListener('click', function() {
                intro.classList.add('hidden');
            });

            // DAFTAR PRODUK (PNG dengan latar transparan)
            const products = [
                'Choosic1.png',
                'Choosic2.png',
                'Choosic3.png',
                'Choosic4.png',
                'Chozy1.png',
                'Chozy2.png',
                'Produk1.png',
                'Produk2.png'
            ];

            const img = document.getElementById('productImage');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const counter = document.getElementById('counter');

            let currentIndex = 0;

            function updateDisplay() {
                img.src = products[currentIndex];
                counter.textContent = (currentIndex + 1) + '/' + products.length;
                prevBtn.disabled = currentIndex === 0;
                nextBtn.disabled = currentIndex === products.length - 1;
            }

            prevBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (currentIndex > 0) {
                    currentIndex--;
                    updateDisplay();
                }
            });

            nextBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (currentIndex < products.length - 1) {
                    currentIndex++;
                    updateDisplay();
                }
            });

            // Handle error gambar
            img.onerror = function() {
                console.log('Image not found:', img.src);
                // Tetap tampilkan tanpa placeholder agar latar transparan tetap terlihat
            };

            updateDisplay();
        })();
    </script>
</body>
    </html>
