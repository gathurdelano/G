<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KACHOO EXHIBITION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 0 12px;
        }

        /* LIGHTING EFFECT */
        .light-spot {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(255,255,255,0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 20%, rgba(255,255,255,0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 1;
        }

        .floor-glow {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 150px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.2) 0%, transparent 80%);
            pointer-events: none;
            z-index: 1;
        }

        /* MAIN CONTAINER */
        .container {
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: space-between;
            padding: 16px 0;
        }

        /* INTRO OVERLAY - simple dan functional */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.4s ease;
        }

        .intro-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .intro-card {
            width: 100%;
            max-width: 340px;
            background: rgba(20,20,20,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 30px rgba(255,255,255,0.1);
        }

        .intro-card p {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 32px;
            line-height: 1.5;
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }

        /* TOMBOL ENTER - simple, mudah diklik, ga perlu besar banget */
        .intro-btn {
            background: transparent;
            border: 1.5px solid #fff;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 3px;
            padding: 14px 28px;
            border-radius: 40px;
            width: fit-content;
            margin: 0 auto;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
            min-width: 180px;
        }

        .intro-btn:active {
            background: #fff;
            color: #000;
            box-shadow: 0 0 30px #fff;
        }

        /* HEADER */
        .header {
            text-align: center;
            margin: 8px 0 16px;
        }

        .header h1 {
            font-size: clamp(1.8rem, 7vw, 2.4rem);
            font-weight: 500;
            letter-spacing: 4px;
            text-shadow: 0 0 20px #fff, 0 0 40px rgba(255,255,255,0.3);
        }

        /* EXHIBITION AREA */
        .exhibition-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 8px 0;
        }

        /* PEDESTAL (MEJA) */
        .pedestal {
            position: relative;
            width: 100%;
            max-width: 360px;
            height: 260px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .table {
            position: absolute;
            bottom: 0;
            width: 85%;
            left: 7.5%;
            height: 70px;
            background: linear-gradient(145deg, #333, #1a1a1a);
            border-radius: 12px 12px 0 0;
            box-shadow: 
                0 -2px 10px rgba(255,255,255,0.2),
                0 15px 25px rgba(0,0,0,0.8),
                0 0 0 1px rgba(255,255,255,0.2) inset,
                0 0 30px rgba(255,255,255,0.15);
            border-top: 1px solid rgba(255,255,255,0.3);
        }

        .light-bar {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 50px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.5) 0%, transparent 80%);
            border-radius: 50%;
            filter: blur(15px);
            opacity: 0.6;
            pointer-events: none;
        }

        /* PRODUCT DISPLAY */
        .product-container {
            position: absolute;
            bottom: 55px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8)) drop-shadow(0 0 20px rgba(255,255,255,0.3));
            animation: float 4s infinite alternate ease-in-out;
            pointer-events: none;
        }

        .product-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(1.1) drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }

        @keyframes float {
            0% { transform: translateX(-50%) translateY(0); }
            100% { transform: translateX(-50%) translateY(-8px); }
        }

        /* NAVIGASI - simple dan functional */
        .navigation {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
            margin: 24px 0 16px;
        }

        .nav-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
            touch-action: manipulation;
            padding: 0;
        }

        .nav-btn:active {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 25px #fff;
        }

        .nav-btn:disabled {
            opacity: 0.2;
            border-color: rgba(255,255,255,0.2);
            pointer-events: none;
        }

        .nav-btn svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        .counter {
            font-size: 1rem;
            letter-spacing: 2px;
            color: #ddd;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 4px;
            min-width: 65px;
            text-align: center;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: #999;
            padding: 16px 0 8px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 8px;
        }

        /* RESPONSIVE */
        @media (max-width: 360px) {
            .pedestal { height: 230px; }
            .product-container { width: 170px; height: 170px; bottom: 50px; }
            .nav-btn { width: 44px; height: 44px; }
            .nav-btn svg { width: 24px; height: 24px; }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            .container { min-height: auto; }
            .pedestal { height: 180px; }
            .product-container { width: 130px; height: 130px; bottom: 40px; }
            .header { margin: 4px 0; }
        }
    </style>
</head>
<body>
    <div class="light-spot"></div>
    <div class="floor-glow"></div>

    <!-- INTRO OVERLAY -->
    <div class="intro-overlay" id="introOverlay">
        <div class="intro-card">
            <p>KACHOO<br>EXHIBITION</p>
            <button class="intro-btn" id="introBtn">ENTER</button>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container">
        <header class="header">
            <h1>KACHOO EXHIBITION</h1>
        </header>

        <div class="exhibition-area">
            <div class="pedestal">
                <div class="table"></div>
                <div class="light-bar"></div>
                <div class="product-container" id="productContainer">
                    <img id="productImage" src="" alt="product">
                </div>
            </div>
        </div>

        <!-- NAVIGATION -->
        <div class="navigation">
            <button class="nav-btn" id="prevBtn" disabled>
                <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <div class="counter" id="counter">1/8</div>
            <button class="nav-btn" id="nextBtn">
                <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
        </div>

        <footer class="footer">
            For Roleplay Purpose Only · Kachoo 2026
        </footer>
    </div>

    <script>
        (function() {
            // INTRO
            const intro = document.getElementById('introOverlay');
            const introBtn = document.getElementById('introBtn');
            
            introBtn.addEventListener('click', function() {
                intro.classList.add('hidden');
            });

            // DAFTAR PRODUK
            const products = [
                'products/Choosic1.png',
                'products/Choosic2.png',
                'products/Choosic3.png',
                'products/Choosic4.png',
                'products/Chozy1.png',
                'products/Chozy2.png',
                'products/Produk1.png',
                'products/Produk2.png'
            ];

            const img = document.getElementById('productImage');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const counter = document.getElementById('counter');

            let currentIndex = 0;

            function updateDisplay() {
                img.src = products[currentIndex];
                counter.textContent = (currentIndex + 1) + '/' + products.length;
                prevBtn.disabled = currentIndex === 0;
                nextBtn.disabled = currentIndex === products.length - 1;
            }

            prevBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (currentIndex > 0) {
                    currentIndex--;
                    updateDisplay();
                }
            });

            nextBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (currentIndex < products.length - 1) {
                    currentIndex++;
                    updateDisplay();
                }
            });

            // Handle error gambar
            img.onerror = function() {
                console.log('Image not found:', img.src);
                // Tetap tampilkan placeholder atau biarkan broken image
            };

            updateDisplay();
        })();
    </script>
</body>
</html>
