<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kachoo Building</title>
  <!-- Inter font & minimal icons (only arrow for CTA, no emoticons/symbols) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #000000;
      color: #FFFFFF;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden; /* fullscreen scenes, no scroll on body */
      width: 100%;
      height: 100%;
    }

    /* scene layers */
    .scene {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* dark overlay – 'rada gelap' but not too dark: 20% black */
    .scene::after {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.2); 
      pointer-events: none;
      z-index: 1;
    }

    /* all content above overlay */
    .content {
      position: relative;
      z-index: 20;
      width: 100%;
      max-width: 1280px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* hidden state for scene switch */
    .scene.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ---------- BACKGROUND UNTUK DESKTOP (default) ---------- */
    #scene-building {
      background-image: url('building1.png'); /* 1920x1080 untuk desktop */
    }
    #scene-lobby {
      background-image: url('lobby1.png'); /* 1920x1080 untuk desktop */
    }

    /* ---------- BACKGROUND UNTUK MOBILE & TABLET (max-width: 1024px) ---------- */
    @media (max-width: 1024px) {
      #scene-building {
        background-image: url('building2.png'); /* 768x1024 untuk mobile/tablet */
      }
      #scene-lobby {
        background-image: url('lobby2.png'); /* 768x1024 untuk mobile/tablet */
      }
    }

    /* Fallback SVG jika gambar tidak tersedia (untuk development) */
    @media (min-width: 1025px) {
      #scene-building {
        background-image: url('building1.png'), url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22><rect width=%22400%22 height=%22300%22 fill=%22%23222c3a%22/><rect x=%2250%22 y=%2280%22 width=%22300%22 height=%22160%22 fill=%22%233a4a5e%22 rx=%228%22/><rect x=%22120%22 y=%22120%22 width=%2240%22 height=%2240%22 fill=%22%235e6b7e%22 rx=%224%22/><rect x=%22240%22 y=%22120%22 width=%2240%22 height=%2240%22 fill=%22%235e6b7e%22 rx=%224%22/><rect x=%22100%22 y=%22200%22 width=%22200%22 height=%2220%22 fill=%22%231a2532%22/><circle cx=%22200%22 cy=%22100%22 r=%2212%22 fill=%22%23aab7c9%22 /></svg>');
      }
      #scene-lobby {
        background-image: url('lobby1.png'), url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22><rect width=%22400%22 height=%22300%22 fill=%22%23354b42%22/><rect x=%2230%22 y=%2250%22 width=%22340%22 height=%22200%22 fill=%22%236a7c70%22 rx=%2216%22/><rect x=%2280%22 y=%22100%22 width=%2260%22 height=%2260%22 fill=%22%23aac3b3%22 rx=%228%22/><rect x=%22260%22 y=%22100%22 width=%2260%22 height=%2260%22 fill=%22%23aac3b3%22 rx=%228%22/><circle cx=%22200%22 cy=%22150%22 r=%2230%22 fill=%22%23cadfd1%22 opacity=%220.6%22 /></svg>');
      }
    }

    @media (max-width: 1024px) {
      #scene-building {
        background-image: url('building2.png'), url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 600%22><rect width=%22400%22 height=%22600%22 fill=%22%23222c3a%22/><rect x=%2250%22 y=%22150%22 width=%22300%22 height=%22300%22 fill=%22%233a4a5e%22 rx=%228%22/><rect x=%22120%22 y=%22200%22 width=%2240%22 height=%2240%22 fill=%22%235e6b7e%22 rx=%224%22/><rect x=%22240%22 y=%22200%22 width=%2240%22 height=%2240%22 fill=%22%235e6b7e%22 rx=%224%22/><rect x=%22100%22 y=%22400%22 width=%22200%22 height=%2220%22 fill=%22%231a2532%22/><circle cx=%22200%22 cy=%22250%22 r=%2212%22 fill=%22%23aab7c9%22 /></svg>');
      }
      #scene-lobby {
        background-image: url('lobby2.png'), url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 600%22><rect width=%22400%22 height=%22600%22 fill=%22%23354b42%22/><rect x=%2230%22 y=%22100%22 width=%22340%22 height=%22400%22 fill=%22%236a7c70%22 rx=%2216%22/><rect x=%2280%22 y=%22200%22 width=%2260%22 height=%2260%22 fill=%22%23aac3b3%22 rx=%228%22/><rect x=%22260%22 y=%22200%22 width=%2260%22 height=%2260%22 fill=%22%23aac3b3%22 rx=%228%22/><circle cx=%22200%22 cy=%22300%22 r=%2230%22 fill=%22%23cadfd1%22 opacity=%220.6%22 /></svg>');
      }
    }

    /* ---------- welcome message – pure text, clean B&W ---------- */
    .welcome-message {
      text-align: center;
      margin-bottom: 2.5rem;
      width: 100%;
    }

    .welcome-message h1 {
      font-size: clamp(2rem, 10vw, 4rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      color: #FFFFFF;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      line-height: 1.1;
    }

    .welcome-message p {
      font-size: clamp(1rem, 4vw, 1.3rem);
      font-weight: 400;
      color: #EEEEEE;
      opacity: 0.9;
      margin-top: 0.75rem;
    }

    /* ---------- container tombol – pure black/white, glass ---------- */
    .button-container {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      align-items: center;
      padding: 2rem 2.5rem;
      background: rgba(0, 0, 0, 0.65);  
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.7);
      max-width: 1000px;
      margin: 0 auto;
    }

    /* tombol persis gaya referensi: bold, inter, transisi */
    .floor-btn {
      padding: 1rem 2rem;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #FFFFFF;
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      min-width: 160px;
      backdrop-filter: blur(4px);
      background-color: rgba(0, 0, 0, 0.4);
    }

    .floor-btn:hover {
      background-color: #FFFFFF;
      color: #000000;
      border-color: #FFFFFF;
      transform: scale(1.03) translateY(-2px);
      box-shadow: 0 20px 30px -8px #000000;
    }

    /* floor indicator (ground floor label) */
    .floor-label {
      margin-top: 2rem;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #CCCCCC;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      padding: 0.5rem 1.8rem;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      text-transform: uppercase;
    }

    /* enter area */
    .enter-area {
      cursor: pointer;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* responsive adjustments for buttons */
    @media (max-width: 700px) {
      .button-container {
        padding: 1.8rem 1.5rem;
        gap: 0.8rem;
        border-radius: 28px;
        width: 95%;
      }
      .floor-btn {
        padding: 0.9rem 1.2rem;
        font-size: 1rem;
        min-width: 140px;
        flex: 1 0 auto;
        max-width: 260px;
      }
      .welcome-message h1 {
        font-size: clamp(2rem, 8vw, 3rem);
      }
    }

    @media (max-width: 480px) {
      .floor-btn {
        min-width: 100%;
        max-width: 100%;
        padding: 1rem 1.2rem;
      }
      .button-container {
        padding: 1.5rem 1rem;
      }
      .floor-label {
        font-size: 0.8rem;
        padding: 0.4rem 1.2rem;
      }
    }

    /* transition helper */
    .no-transition {
      transition: none !important;
    }
  </style>
</head>
<body>
  <!-- BUILDING SCENE (initial) -->
  <div id="scene-building" class="scene">
    <div class="content">
      <!-- welcome message – klik area untuk masuk, tanpa simbol/petunjuk visual berlebih, hanya teks -->
      <div class="enter-area" id="enter-lobby-trigger">
        <div class="welcome-message">
          <h1>WELCOME TO THE KACHOO</h1>
          <p>Headquarters · explore every level</p>
        </div>
      </div>
    </div>
  </div>

  <!-- LOBBY SCENE (ground) – hidden initially -->
  <div id="scene-lobby" class="scene hidden">
    <div class="content">
      <!-- container tombol persis daftar yang diminta -->
      <div class="button-container">
        <a href="lift.html" class="floor-btn" target="_blank">Lift</a>
        <a href="info.html" class="floor-btn" target="_blank">Information desk</a>
        <a href="GH.html" class="floor-btn" target="_blank">Grand Hall</a>
        <a href="Exhibition.html" class="floor-btn" target="_blank">Exhibition Center</a>
        <a href="Chobank.html" class="floor-btn" target="_blank">Chobank</a>
        <a href="FC.html" class="floor-btn" target="_blank">Food Court</a>
      </div>
      <!-- keterangan lantai ground, tanpa icon, full teks -->
      <div class="floor-label">THE KACHOO · GROUND FLOOR</div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      const buildingScene = document.getElementById('scene-building');
      const lobbyScene = document.getElementById('scene-lobby');
      const enterTrigger = document.getElementById('enter-lobby-trigger');

      // fungsi pindah ke lobby dengan transisi halus (opacity fade)
      function switchToLobby() {
        if (lobbyScene.classList.contains('hidden') === false) return; // already visible

        // pastikan building tidak dalam transisi ganda
        buildingScene.style.transition = 'opacity 0.9s ease';
        lobbyScene.style.transition = 'opacity 0.9s ease';

        // sembunyikan building, munculkan lobby
        buildingScene.classList.add('hidden');
        lobbyScene.classList.remove('hidden');

        // sedikit reset transisi setelah selesai
        setTimeout(() => {
          buildingScene.style.transition = '';
          lobbyScene.style.transition = '';
        }, 1000);
      }

      // event listener: klik area welcome
      if (enterTrigger) {
        enterTrigger.addEventListener('click', switchToLobby);
      }

      // keadaan awal: building visible, lobby hidden
      window.addEventListener('load', function() {
        buildingScene.classList.remove('hidden');
        lobbyScene.classList.add('hidden');
      });
    })();
  </script>
</body>
  </html>
