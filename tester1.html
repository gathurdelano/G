<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Kachoo Building · Interactive Entrance</title>
  <!-- Inter font -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #000000;
      color: #FFFFFF;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    /* BUILDING SCENE - full interactive */
    #scene-building {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Dark overlay - lebih transparan */
    #scene-building::after {
      content: '';
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.2);
      pointer-events: none;
      z-index: 1;
    }

    /* Background images */
    #scene-building {
      background-image: url('building1.png');
    }

    @media (max-width: 1024px) {
      #scene-building {
        background-image: url('building2.png');
      }
    }

    /* Fallback SVG */
    @media (min-width: 1025px) {
      #scene-building {
        background-image: url('building1.png'), url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 300%22><rect width=%22400%22 height=%22300%22 fill=%22%23222c3a%22/><rect x=%2250%22 y=%2280%22 width=%22300%22 height=%22160%22 fill=%22%233a4a5e%22 rx=%228%22/><rect x=%22120%22 y=%22120%22 width=%2240%22 height=%2240%22 fill=%22%235e6b7e%22 rx=%224%22/><rect x=%22240%22 y=%22120%22 width=%2240%22 height=%2240%22 fill=%22%235e6b7e%22 rx=%224%22/><rect x=%22100%22 y=%22200%22 width=%22200%22 height=%2220%22 fill=%22%231a2532%22/><circle cx=%22200%22 cy=%22100%22 r=%2212%22 fill=%22%23aab7c9%22 /></svg>');
      }
    }

    @media (max-width: 1024px) {
      #scene-building {
        background-image: url('building2.png'), url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 400 600%22><rect width=%22400%22 height=%22600%22 fill=%22%23222c3a%22/><rect x=%2250%22 y=%22150%22 width=%22300%22 height=%22300%22 fill=%22%233a4a5e%22 rx=%228%22/><rect x=%22120%22 y=%22200%22 width=%2240%22 height=%2240%22 fill=%22%235e6b7e%22 rx=%224%22/><rect x=%22240%22 y=%22200%22 width=%2240%22 height=%2240%22 fill=%22%235e6b7e%22 rx=%224%22/><rect x=%22100%22 y=%22400%22 width=%22200%22 height=%2220%22 fill=%22%231a2532%22/><circle cx=%22200%22 cy=%22250%22 r=%2212%22 fill=%22%23aab7c9%22 /></svg>');
      }
    }

    /* CONTENT WRAPPER - semua elemen di atas overlay */
    .building-content {
      position: relative;
      z-index: 20;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* Welcome message - lebih kecil, lebih elegan */
    .welcome-message {
      text-align: center;
      margin-bottom: 3rem;
      animation: floatIn 1.2s ease-out;
    }

    @keyframes floatIn {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .welcome-message h1 {
      font-size: clamp(2.5rem, 12vw, 5rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      color: #FFFFFF;
      text-shadow: 0 4px 30px rgba(0, 0, 0, 0.7), 0 0 20px rgba(255, 255, 255, 0.3);
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }

    .welcome-message p {
      font-size: clamp(1rem, 4vw, 1.3rem);
      font-weight: 400;
      color: #EEEEEE;
      opacity: 0.95;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    /* INTERACTIVE ZONES - area yang bisa disentuh di seluruh gedung */
    .interactive-zones {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 25;
      pointer-events: none; /* parent tidak menerima event, children bisa */
    }

    .zone {
      position: absolute;
      pointer-events: auto;
      cursor: pointer;
      transition: all 0.3s ease;
      border-radius: 12px;
      background: transparent;
    }

    /* Zona entrance utama - seluruh bangunan */
    .zone-main {
      top: 15%;
      left: 20%;
      width: 60%;
      height: 60%;
      background: rgba(255, 255, 255, 0.02); /* hampir tak terlihat */
      backdrop-filter: blur(2px);
      border: 2px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 50px rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 40px;
    }

    .zone-main:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 0 80px rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(8px);
    }

    .zone-main:hover .zone-label {
      opacity: 1;
      transform: translateY(0);
    }

    /* Zona pintu masuk (lebih spesifik) */
    .zone-door {
      bottom: 25%;
      left: 40%;
      width: 20%;
      height: 25%;
      background: rgba(255, 215, 0, 0.05);
      border: 2px solid rgba(255, 215, 0, 0.3);
      border-radius: 30px 30px 15px 15px;
      backdrop-filter: blur(4px);
    }

    .zone-door:hover {
      background: rgba(255, 215, 0, 0.15);
      border-color: rgba(255, 215, 0, 0.8);
      box-shadow: 0 0 60px rgba(255, 215, 0, 0.4);
    }

    .zone-door:hover .zone-label {
      opacity: 1;
      transform: translateY(0);
    }

    /* Zona jendela (alternatif entrance) */
    .zone-window {
      top: 30%;
      left: 30%;
      width: 15%;
      height: 20%;
      background: rgba(100, 200, 255, 0.03);
      border: 2px solid rgba(100, 200, 255, 0.2);
      border-radius: 20px;
      backdrop-filter: blur(4px);
    }

    .zone-window:hover {
      background: rgba(100, 200, 255, 0.1);
      border-color: rgba(100, 200, 255, 0.6);
      box-shadow: 0 0 50px rgba(100, 200, 255, 0.4);
    }

    .zone-window:hover .zone-label {
      opacity: 1;
      transform: translateY(0);
    }

    /* Zona atap / rooftop */
    .zone-roof {
      top: 5%;
      left: 35%;
      width: 30%;
      height: 10%;
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 40px 40px 10px 10px;
      backdrop-filter: blur(4px);
    }

    .zone-roof:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.5);
      box-shadow: 0 0 50px rgba(255, 255, 255, 0.3);
    }

    .zone-roof:hover .zone-label {
      opacity: 1;
      transform: translateY(0);
    }

    /* Label untuk setiap zone */
    .zone-label {
      position: absolute;
      bottom: -40px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      color: white;
      padding: 0.4rem 1.2rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      white-space: nowrap;
      border: 1px solid rgba(255, 255, 255, 0.3);
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      text-transform: uppercase;
    }

    .zone-door .zone-label {
      bottom: -40px;
      background: rgba(255, 215, 0, 0.2);
      border-color: rgba(255, 215, 0, 0.5);
      color: #ffeb9f;
    }

    .zone-window .zone-label {
      background: rgba(100, 200, 255, 0.2);
      border-color: rgba(100, 200, 255, 0.5);
      color: #b3e4ff;
    }

    .zone-roof .zone-label {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.5);
    }

    /* Tombol masuk utama (masih ada sebagai opsi) */
    .enter-button {
      background: rgba(255, 255, 255, 0.9);
      color: #000000;
      border: none;
      padding: 1rem 3rem;
      font-size: 1.2rem;
      font-weight: 700;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 2px solid white;
      letter-spacing: 1px;
      margin-top: 2rem;
      z-index: 30;
      position: relative;
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
      50% { transform: scale(1.05); box-shadow: 0 20px 40px rgba(255, 255, 255, 0.3); background: rgba(255, 255, 255, 1); }
      100% { transform: scale(1); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); }
    }

    .enter-button:hover {
      transform: scale(1.1);
      background: #ffffff;
      box-shadow: 0 0 50px rgba(255, 255, 255, 0.5);
    }

    /* Efek ripple saat diklik */
    .ripple-effect {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
      transform: scale(0);
      animation: ripple 0.6s ease-out;
      pointer-events: none;
      z-index: 100;
    }

    @keyframes ripple {
      to {
        transform: scale(6);
        opacity: 0;
      }
    }

    /* Loading animation saat pindah halaman */
    .page-transition {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .page-transition.active {
      opacity: 1;
      pointer-events: all;
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Hover effect untuk seluruh area */
    .hover-glow {
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.2) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 15;
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .zone-main {
        top: 10%;
        left: 10%;
        width: 80%;
        height: 70%;
      }
      
      .zone-door {
        left: 35%;
        width: 30%;
      }
      
      .zone-window {
        left: 20%;
        width: 25%;
      }
      
      .zone-roof {
        left: 25%;
        width: 50%;
      }
      
      .zone-label {
        font-size: 0.7rem;
        padding: 0.3rem 1rem;
        bottom: -35px;
      }
      
      .enter-button {
        padding: 0.8rem 2rem;
        font-size: 1rem;
      }
    }

    @media (max-width: 480px) {
      .zone-label {
        display: none; /* Sembunyikan label di layar kecil agar tidak penuh */
      }
      
      .zone:hover .zone-label {
        display: block;
      }
    }

    /* Floating particles (efek visual) */
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 10;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      animation: float 8s infinite linear;
    }

    @keyframes float {
      0% { transform: translateY(100vh) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100px) translateX(100px); opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- BUILDING SCENE - Full interactive -->
  <div id="scene-building">
    <!-- Partikel latar -->
    <div class="particles" id="particles"></div>
    
    <!-- Hover glow effect -->
    <div class="hover-glow" id="hoverGlow"></div>
    
    <!-- Interactive zones -->
    <div class="interactive-zones">
      <!-- Zona utama - seluruh gedung -->
      <div class="zone zone-main" id="zoneMain" data-zone="main">
        <span class="zone-label">ENTER BUILDING</span>
      </div>
      
      <!-- Zona pintu masuk -->
      <div class="zone zone-door" id="zoneDoor" data-zone="door">
        <span class="zone-label">MAIN DOOR</span>
      </div>
      
      <!-- Zona jendela -->
      <div class="zone zone-window" id="zoneWindow" data-zone="window">
        <span class="zone-label">WINDOW</span>
      </div>
      
      <!-- Zona atap -->
      <div class="zone zone-roof" id="zoneRoof" data-zone="roof">
        <span class="zone-label">ROOFTOP</span>
      </div>
    </div>
    
    <!-- Content utama (tetap ada teks dan tombol) -->
    <div class="building-content">
      <div class="welcome-message">
        <h1>KACHOO BUILDING</h1>
        <p>Touch anywhere on the building to enter</p>
      </div>
      
      <!-- Tombol masuk alternatif -->
      <button class="enter-button" id="enterButton">
        ENTER NOW →
      </button>
    </div>
  </div>

  <!-- Page transition overlay -->
  <div class="page-transition" id="pageTransition">
    <div class="loader"></div>
  </div>

  <script>
    (function() {
      'use strict';
      
      const buildingScene = document.getElementById('scene-building');
      const transitionOverlay = document.getElementById('pageTransition');
      const enterButton = document.getElementById('enterButton');
      
      // Interactive zones
      const zones = document.querySelectorAll('.zone');
      
      // Hover effect
      const hoverGlow = document.getElementById('hoverGlow');
      
      // Buat partikel
      function createParticles() {
        const particlesContainer = document.getElementById('particles');
        const particleCount = 30;
        
        for (let i = 0; i < particleCount; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.animationDelay = Math.random() * 8 + 's';
          particle.style.width = Math.random() * 6 + 2 + 'px';
          particle.style.height = particle.style.width;
          particle.style.background = `rgba(255, 255, 255, ${Math.random() * 0.5})`;
          particlesContainer.appendChild(particle);
        }
      }
      
      // Efek ripple saat klik
      function createRipple(event, element) {
        const ripple = document.createElement('span');
        ripple.className = 'ripple-effect';
        
        const rect = element.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (event.clientX - rect.left - size/2) + 'px';
        ripple.style.top = (event.clientY - rect.top - size/2) + 'px';
        
        element.appendChild(ripple);
        
        setTimeout(() => {
          ripple.remove();
        }, 600);
      }
      
      // Fungsi untuk pindah ke Lobby.html
      function goToLobby(event, source) {
        // Buat ripple effect
        if (event) {
          createRipple(event, source);
        }
        
        // Aktifkan transition overlay
        transitionOverlay.classList.add('active');
        
        // Animasi keluar building
        buildingScene.style.transform = 'scale(1.05)';
        buildingScene.style.filter = 'brightness(1.5) blur(2px)';
        buildingScene.style.opacity = '0';
        
        // Redirect ke Lobby.html
        setTimeout(() => {
          window.location.href = 'Lobby.html';
        }, 800);
      }
      
      // Event listeners untuk setiap zone
      zones.forEach(zone => {
        zone.addEventListener('click', (e) => {
          e.stopPropagation();
          
          // Animasi khusus berdasarkan zone
          const zoneType = zone.dataset.zone;
          
          // Efek visual berbeda tiap zone
          switch(zoneType) {
            case 'main':
              buildingScene.style.transform = 'scale(1.02)';
              buildingScene.style.filter = 'brightness(1.3)';
              break;
            case 'door':
              buildingScene.style.transform = 'scale(1.01) translateY(-5px)';
              buildingScene.style.filter = 'brightness(1.4) sepia(0.3)';
              break;
            case 'window':
              buildingScene.style.transform = 'scale(1.01) translateX(5px)';
              buildingScene.style.filter = 'brightness(1.4) hue-rotate(10deg)';
              break;
            case 'roof':
              buildingScene.style.transform = 'scale(1.02) translateY(-10px)';
              buildingScene.style.filter = 'brightness(1.5)';
              break;
          }
          
          goToLobby(e, zone);
        });
        
        // Hover effect untuk label
        zone.addEventListener('mouseenter', (e) => {
          // Update posisi hover glow
          const rect = zone.getBoundingClientRect();
          const x = (rect.left + rect.width / 2) / window.innerWidth * 100;
          const y = (rect.top + rect.height / 2) / window.innerHeight * 100;
          hoverGlow.style.setProperty('--x', x + '%');
          hoverGlow.style.setProperty('--y', y + '%');
          hoverGlow.style.opacity = '1';
        });
        
        zone.addEventListener('mouseleave', () => {
          hoverGlow.style.opacity = '0';
        });
      });
      
      // Tombol enter juga bisa diklik
      enterButton.addEventListener('click', (e) => {
        e.stopPropagation();
        
        // Animasi tombol
        enterButton.style.transform = 'scale(0.95)';
        setTimeout(() => {
          enterButton.style.transform = 'scale(1)';
        }, 200);
        
        goToLobby(e, enterButton);
      });
      
      // Klik di background (building scene) juga bisa masuk
      buildingScene.addEventListener('click', (e) => {
        // Cek apakah yang diklik adalah zone atau button
        if (e.target === buildingScene || e.target.classList.contains('building-content') || e.target.closest('.welcome-message')) {
          // Buat ripple di tengah layar
          const fakeEvent = { clientX: window.innerWidth / 2, clientY: window.innerHeight / 2 };
          createRipple(fakeEvent, buildingScene);
          
          // Animasi building
          buildingScene.style.transform = 'scale(1.03)';
          buildingScene.style.filter = 'brightness(1.3) blur(1px)';
          
          goToLobby(e, buildingScene);
        }
      });
      
      // Efek hover glow mengikuti mouse
      document.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth) * 100;
        const y = (e.clientY / window.innerHeight) * 100;
        hoverGlow.style.setProperty('--x', x + '%');
        hoverGlow.style.setProperty('--y', y + '%');
      });
      
      // Inisialisasi partikel
      createParticles();
      
      // Animasi masuk awal
      buildingScene.style.opacity = '0';
      buildingScene.style.transform = 'scale(0.98)';
      
      setTimeout(() => {
        buildingScene.style.opacity = '1';
        buildingScene.style.transform = 'scale(1)';
      }, 100);
      
      // Responsive: sembunyikan label di mobile, tapi tampilkan saat hover
      if (window.innerWidth <= 480) {
        zones.forEach(zone => {
          zone.addEventListener('touchstart', () => {
            const label = zone.querySelector('.zone-label');
            if (label) {
              label.style.opacity = '1';
              setTimeout(() => {
                label.style.opacity = '0';
              }, 1500);
            }
          });
        });
      }
    })();
  </script>
</body>
          </html>
